<title>BarrCan &middot; Pagos</title>
<!--
  BARRCAN · MÓDULO: PAGOS (standalone)
  VERSIÓN : v4.4
  FECHA   : 2026-07-13
  v4.4 — Fix: liquidar saldo ya no lo marca como "entregado":
    - Bug real encontrado: al llegar el saldo a $0, este archivo ponía
      estado='entregado' en el presupuesto — pero esa palabra la usa
      entregas.html para decir "ya se instaló/entregó físicamente", no
      "ya se pagó". Resultado: en cuanto se liquidaba un presupuesto,
      desaparecía del dropdown de folios en entregas.html aunque la
      instalación todavía no se hubiera hecho.
    - Ahora, liquidar el saldo mueve el presupuesto a 'pendiente_entrega'
      (ya pagado, falta entregar) en vez de 'entregado'. El estado
      'entregado' de verdad ahora lo pone entregas.html, únicamente
      cuando se genera el reporte de entrega/instalación.
  VERSIÓN : v4.3
  FECHA   : 2026-07-12
  v4.3 - Logo corregido y cargado desde GitHub Pages:
    - El logo del header estaba corrupto (base64 truncado, por eso se
      veía roto/incompleto) — igual que el bug ya resuelto en
      entregas.html, pero nunca se había corregido aquí. Reemplazado por
      el logo oficial ya validado.
    - El header ahora carga el ícono desde
      https://barrcan.github.io/barrcan-app/assets/logo-icono.jpg, con
      respaldo automático a un base64 embebido si falla.
    - El recibo impreso ya NO copia el src del header (dependía de que
      hubiera cargado bien); ahora usa siempre el base64 de respaldo, así
      el recibo nunca sale con el logo roto, con o sin señal.
  v4.2 — 2026-07-12
    - ADD: El modal "Editar pago" ahora permite subir/cambiar/quitar la
      foto del comprobante — antes solo se podía adjuntar al crear el
      pago y no había forma de agregarla o corregirla después.
    - El campo se precarga con el comprobante existente al abrir el
      modal de edición; el update solo envía comprobante_img si el
      usuario realmente lo tocó (no se borra el comprobante por error
      al editar otros campos).
  v4.1 — 2026-07-11
    - ADD: Paginación — muestra solo 10 pagos inicialmente
    - ADD: Botón "Cargar más" cuando hay más de 10
    - ADD: Botón "Ver todos" cuando hay más de 50
    - ADD: Contador "mostrando X de Y"
    - ADD: Scroll suave al cargar más
  v4.0 — 2026-07-11
    - ADD: Cálculo de saldo en vivo desde SUM(pagos.monto)
    - ADD: presupuesto_id en pagos para enlace directo
    - FIX: saldo ya no se resta del caché desactualizado
-->

<style>

<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="logo-mark">
        <img src="https://barrcan.github.io/barrcan-app/assets/logo-icono.jpg" id="header-logo-img" onerror="this.onerror=null;this.src=_LOGO_ICONO_B64;" style="width:100%;height:100%;object-fit:cover;display:block">
      </div>
      <div><span class="logo-text">BarrCan</span><span class="logo-sub">Canceleria &middot; Campo</span></div>

      <span id="conn-status">Offline-First</span>

    </div>
  </div>

  <div class="content">
    <p class="section-title">Registro de Pagos</p>
    <p class="section-sub">Captura pagos &middot; genera recibo RB-100 &middot; env&iacute;a por WhatsApp</p>

    <!-- HISTORIAL -->
    <div class="wizard-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="wizard-title" style="margin:0">Pagos recientes</div>

          <button onclick="editarFolioRB()" class="btn-edit" title="Editar número de folio RB">N° RB</button>
          <button onclick="pagosCargar()" class="btn-refresh">Actualizar</button>
        </div>

function toast(msg, dur) {
  dur = dur || 2800;
  var el = document.getElementById('_toast');
  if (!el) {
    el = document.createElement('div'); el.id = '_toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, dur);
}

function nextFolioRB() {
  var n = parseInt(localStorage.getItem('barrcan_folio_rb') || '99') + 1;
  localStorage.setItem('barrcan_folio_rb', String(n));
  localStorage.setItem('barrcan_ultimo_folio_recibo', String(n));
  return 'RB-' + n;
}

function editarFolioRB() {
  var actual = localStorage.getItem('barrcan_folio_rb') || '99';
  var msg = 'Folio RB actual: RB-' + actual + '\n\nIngresa el numero desde donde continuar (solo el numero):';
  var nuevo = prompt(msg, actual);
  if (nuevo === null) return;
  var num = parseInt(nuevo, 10);
  if (isNaN(num) || num < 1 || String(num) !== nuevo.trim()) {
    toast('Debe ser un número entero positivo (ej: 100)');
    return;
  }
  localStorage.setItem('barrcan_folio_rb', String(num - 1));
  localStorage.setItem('barrcan_ultimo_folio_recibo', String(num - 1));
  toast('Próximo recibo será RB-' + num);
}

// ── CALCULAR SALDO REAL DESDE SUPABASE ───────────────────────────
async function recalcularSaldoReal(presupuestoId) {
  if (!sb() || !presupuestoId) return null;
  try {
    const { data: pres, error: e1 } = await sb()
      .from('presupuestos_atrasados')
      .select('monto,folio,cliente')
      .eq('id', presupuestoId)
      .single();
    if (e1 || !pres) return null;

    const { data: pagos, error: e2 } = await sb()
      .from('pagos')
      .select('monto')
      .eq('presupuesto_id', presupuestoId);

    if (e2) {
      console.warn('Error al sumar pagos:', e2.message);
      return { saldo: pres.monto || 0, total: pres.monto || 0, pagado: 0 };
    }

    const totalPagado = pagos.reduce((s, p) => s + (p.monto || 0), 0);
    const saldo = Math.max(0, (pres.monto || 0) - totalPagado);

    return { saldo, total: pres.monto || 0, pagado: totalPagado };
  } catch(e) {
    console.warn('recalcularSaldoReal error:', e.message);
    return null;
  }
}

async function recalcularPagadoAntes(presupuestoId) {
  if (!sb() || !presupuestoId) return 0;
  try {
    const { data: pagos, error } = await sb()
      .from('pagos')
      .select('monto')
      .eq('presupuesto_id', presupuestoId);
    if (error) return 0;
    return pagos.reduce((s, p) => s + (p.monto || 0), 0);
  } catch(e) {
    return 0;
  }
}

// ── Dropdown presupuestos ─────────────────────────────────────────
function cargarPresDropdown() {
  var sel = document.getElementById('pago-pres');
  if (!sel) return;

  var local = JSON.parse(localStorage.getItem('barrcan_presupuestos_cache') || '[]')
    .filter(function(p) { return ESTADOS_CON_SALDO.indexOf(p.estado) >= 0; });
  PRES_LIST = local;
  llenarDrop(local);

  if (!sb()) return;
  sb().from('presupuestos_atrasados')
    .select('id,folio,cliente,tel,dir,monto,saldo,descripcion,estado')
    .in('estado', ESTADOS_CON_SALDO)
    .order('folio', { ascending: true }).limit(200)
    .then(async function(result) {
      if (result.error || !result.data || !result.data.length) return;

      var dataConSaldoReal = [];
      for (var i = 0; i < result.data.length; i++) {
        var p = result.data[i];
        var real = await recalcularSaldoReal(p.id);
        if (real) {
          p.saldo = real.saldo;
          p.monto = real.total;
        }
        dataConSaldoReal.push(p);
      }

      PRES_LIST = dataConSaldoReal;
      llenarDrop(dataConSaldoReal);

      var cache = JSON.parse(localStorage.getItem('barrcan_presupuestos_cache') || '[]');
      var pendientes = cache.filter(function(p) { return p._pendiente; });
      var merged = pendientes.concat(dataConSaldoReal);
      localStorage.setItem('barrcan_presupuestos_cache', JSON.stringify(merged));
    }).catch(function(e) {
      console.warn('cargarPresDropdown error:', e.message);
    });
}

function llenarDrop(lista) {
  var sel = document.getElementById('pago-pres');
  if (!sel) return;
  sel.innerHTML = '<option value="">&mdash; Selecciona presupuesto &mdash;</option>';
  lista.forEach(function(p) {
    var o = document.createElement('option');
    o.value = p.id;
    var est = ESTADO_SHORT[p.estado] ? ' [' + ESTADO_SHORT[p.estado] + ']' : '';
    o.textContent = (p.folio || '') + est + ' · ' + p.cliente + ' · Saldo $' + fmt(p.saldo || 0);
    o.dataset.p = JSON.stringify(p);
    sel.appendChild(o);
  });
}

// ── Seleccionar presupuesto ──────────────────────────────────────
async function seleccionarPres() {
  var sel = document.getElementById('pago-pres');
  if (!sel || !sel.value) { clearPres(); return; }
  try {
    var p = JSON.parse(sel.options[sel.selectedIndex].dataset.p || '{}');
    PRES_SEL = p;

    if (p.id && sb()) {
      const real = await recalcularSaldoReal(p.id);
      const pagadoReal = await recalcularPagadoAntes(p.id);

      if (real) {
        p.saldo = real.saldo;
        p.monto = real.total;
        const opt = sel.options[sel.selectedIndex];
        const est = ESTADO_SHORT[p.estado] ? ' [' + ESTADO_SHORT[p.estado] + ']' : '';
        opt.textContent = (p.folio || '') + est + ' · ' + p.cliente + ' · Saldo $' + fmt(p.saldo || 0);
        opt.dataset.p = JSON.stringify(p);
      }

      if (pagadoReal > 0) {
        document.getElementById('pago-ant').value = pagadoReal;
      }
    }

    var s = function(id, v) { var el = document.getElementById(id); if (el) el.value = v || ''; };
    s('pago-folio',   p.folio);
    s('pago-cliente', p.cliente);
    s('pago-tel',     p.tel);
    s('pago-desc',    p.descripcion);
    s('pago-total',   p.monto || 0);

    if (!document.getElementById('pago-ant').value) {
      var pagadoAntes = Math.max(0, (p.monto || 0) - (p.saldo || 0));
      document.getElementById('pago-ant').value = pagadoAntes || 0;
    }

    var montoSugerido = p.saldo || 0;
    if (p.saldo > 0 && p.monto > 0 && (p.saldo / p.monto) > 0.3) {
      montoSugerido = Math.round(p.saldo * 0.5);
    }
    s('pago-monto', montoSugerido);

    actualizarSaldo();

    var pct = p.monto > 0 ? (parseFloat(document.getElementById('pago-ant').value) || 0) / p.monto : 0;
    var sc = document.getElementById('pago-concepto');
    if (sc) sc.value = pct < 0.1 ? 'anticipo' : pct < 0.55 ? 'segundo_pago' : pct < 0.90 ? 'liquidacion' : 'pago_total';

    var card = document.getElementById('pago-pres-card');
    card.classList.add('visible');
    document.getElementById('pago-pres-info').textContent = p.folio + ' \u00b7 ' + p.cliente + ' \u00b7 Saldo real $' + fmt(p.saldo || 0);
  } catch(e) {
    console.warn('seleccionarPres error:', e.message);
  }
}

function clearPres() {
  PRES_SEL = null;
  document.getElementById('pago-pres').value = '';
  document.getElementById('pago-pres-card').classList.remove('visible');
}

function actualizarSaldo() {
  var total = parseFloat(document.getElementById('pago-total').value) || 0;
  var ant   = parseFloat(document.getElementById('pago-ant').value)   || 0;
  var monto = parseFloat(document.getElementById('pago-monto').value) || 0;
  var saldo = Math.max(0, total - ant - monto);
  var el = document.getElementById('pago-saldo');
  el.textContent = '$' + fmt(saldo);
  el.className = 'pago-saldo-display';
  if (saldo <= 0) el.classList.add('saldo-ok');
  else if (saldo < total * 0.2 && total > 0) el.classList.add('saldo-medio');
}

// ── Foto ──────────────────────────────────────────────────────────
function pagoCargarFoto(input) {
  if (!input || !input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    _PAGO_FOTO = e.target.result;
    var img  = document.getElementById('pago-foto-img');
    var prev = document.getElementById('pago-foto-preview');
    if (img)  img.src = _PAGO_FOTO;
    if (prev) prev.classList.add('visible');
  };
  reader.readAsDataURL(input.files[0]);
  input.value = '';
}
function pagoQuitarFoto() {
  _PAGO_FOTO = null;
  var img  = document.getElementById('pago-foto-img');
  var prev = document.getElementById('pago-foto-preview');
  if (img)  img.src = '';
  if (prev) prev.classList.remove('visible');
}

function pagoCargarFotoEdit(input) {
  if (!input || !input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    _PAGO_EDIT_FOTO = e.target.result;
    _PAGO_EDIT_FOTO_TOCADA = true;
    var img  = document.getElementById('edit-foto-img');
    var prev = document.getElementById('edit-foto-preview');
    if (img)  img.src = _PAGO_EDIT_FOTO;
    if (prev) prev.classList.add('visible');
  };
  reader.readAsDataURL(input.files[0]);
  input.value = '';
}
function pagoQuitarFotoEdit() {
  _PAGO_EDIT_FOTO = null;
  _PAGO_EDIT_FOTO_TOCADA = true;
  var img  = document.getElementById('edit-foto-img');
  var prev = document.getElementById('edit-foto-preview');
  if (img)  img.src = '';
  if (prev) prev.classList.remove('visible');
}

// ── Escape HTML ──────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Historial de pagos ───────────────────────────────────────────
async function pagosCargar() {
  resetPaginacion();
  var div = document.getElementById('pagos-lista');
  var local = JSON.parse(localStorage.getItem('barrcan_pagos_cache') || '[]');
  if (local.length) { PAGOS_CACHE = local; pagosRender(); }
  else div.innerHTML = '<div style="text-align:center;padding:14px;color:var(--gray-400);font-size:13px">Sin pagos registrados</div>';

  if (!sb()) return;
  try {
    var result = await sb().from('pagos')
      .select('id,monto,fecha_pago,forma_pago,concepto,notas,comprobante_img,created_at,presupuesto_id')
      .order('created_at', { ascending: false }).limit(200);
    if (result.error) throw result.error;
    SYNC.online = true; detectarConexion();
    var pendientes = PAGOS_CACHE.filter(function(p) { return p._pendiente; });
    PAGOS_CACHE = pendientes.concat(result.data || []);
    localStorage.setItem('barrcan_pagos_cache', JSON.stringify(PAGOS_CACHE));
    pagosRender();
  } catch(e) {
    var esRed = /failed to fetch|network|fetch/i.test(e.message || '');
    if (esRed) { SYNC.online = false; detectarConexion(); }
    console.warn('pagosCargar:', e.message);
    if (!local.length)
      div.innerHTML = '<div style="text-align:center;padding:14px;color:var(--gray-400);font-size:13px">'
        + (esRed ? 'Sin conexion' : 'Error al cargar') + '<br>'
        + '<button onclick="pagosCargar()" style="margin-top:6px;padding:5px 12px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:11px;cursor:pointer">Reintentar</button></div>';
  }
}

function cargarMasPagos() {
  PAGOS_MOSTRADOS = Math.min(PAGOS_MOSTRADOS + 10, PAGOS_CACHE.length);
  pagosRender();
  var el = document.getElementById('pagos-lista');
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function verTodosPagos() {
  PAGOS_MOSTRADOS = PAGOS_CACHE.length;
  pagosRender();
  var el = document.getElementById('pagos-lista');
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  toast('Mostrando todos los ' + PAGOS_CACHE.length + ' pagos');
}

function pagosRender() {
  var pend = JSON.parse(localStorage.getItem('barrcan_pagos_pend') || '[]');
  var el   = document.getElementById('pagos-contador');

  if (el) {
    var total = PAGOS_CACHE.length;
    var txt = total + ' pago' + (total > 1 ? 's' : '');
    var mostrando = Math.min(PAGOS_MOSTRADOS, total);
    if (total > 0) {
      txt += ' · mostrando ' + mostrando + ' de ' + total;
    }
    if (pend.length) {
      txt += ' &middot; <span onclick="pagoReintentarPendientes()" style="color:var(--gold);font-weight:700;cursor:pointer;text-decoration:underline">' + pend.length + ' sin sincronizar</span>';
    }
    el.innerHTML = txt;
  }

  var div = document.getElementById('pagos-lista');
  if (!PAGOS_CACHE.length) {
    div.innerHTML = '<div style="text-align:center;padding:14px;color:var(--gray-400);font-size:13px">Sin pagos registrados</div>';
    return;
  }

  var hoy = new Date().toISOString().split('T')[0];
  var totalHoy = PAGOS_CACHE.filter(function(p) { return p.fecha_pago === hoy; })
    .reduce(function(s, p) { return s + (parseFloat(p.monto) || 0); }, 0);

  var html = totalHoy > 0
    ? '<div class="pago-hoy"><span class="pago-hoy-label">Cobrado hoy</span><span class="pago-hoy-monto">$' + fmt(totalHoy) + '</span></div>'
    : '';

  var mostrar = Math.min(PAGOS_MOSTRADOS, PAGOS_CACHE.length);

  for (var i = 0; i < mostrar; i++) {
    var p = PAGOS_CACHE[i];
    var cls = 'pago-item' + (p._pendiente ? ' pendiente' : '');
    var pendTag = p._pendiente ? '<div class="pago-pend-tag">SIN SINCRONIZAR</div>' : '';
    var idStr = (p.id || '').replace(/'/g, '');

    var rbMatch = (p.notas || '').match(/RECIBO:(RB-\d+)/);
    var rbLabel = rbMatch ? '<span class="pago-rb-label">' + rbMatch[1] + '</span>' : '';

    html += '<div class="' + cls + '">'
      + '<div class="pago-item-info">' + pendTag
      + '<div class="pago-item-titulo">' + (FORMA_E[p.forma_pago] || '') + ' ' + (CONCEPTO_L[p.concepto] || p.concepto || 'Pago') + rbLabel + '</div>'
      + '<div class="pago-item-detalle">' + esc(p.fecha_pago || '') + (p.notas ? ' \u00b7 ' + esc(p.notas.slice(0, 35)) : '') + '</div>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<div style="font-family:monospace;font-size:15px;font-weight:800;color:var(--green)">$' + fmt(p.monto) + '</div>'
      + (p.id && !p._pendiente ? '<button onclick="pagoAbrirEdicion(\'' + idStr + '\')" class="pago-item-edit">&#9999;</button>' : '')
      + '</div></div>';
  }

  // Botón "Cargar más" si hay más de 10
  if (PAGOS_MOSTRADOS < PAGOS_CACHE.length) {
    var restantes = PAGOS_CACHE.length - PAGOS_MOSTRADOS;
    html += '<div style="text-align:center;padding:8px 0;margin-top:6px">'
      + '<button onclick="cargarMasPagos()" class="btn-cargar-mas">'
      + 'Cargar ' + Math.min(10, restantes) + ' más  · ' + restantes + ' restantes'
      + '</button>'
      + '</div>';
  }

  // Botón "Ver todos" si hay más de 50
  if (PAGOS_CACHE.length > 50 && PAGOS_MOSTRADOS < PAGOS_CACHE.length) {
    html += '<div style="text-align:center;padding:4px 0">'
      + '<button onclick="verTodosPagos()" class="btn-ver-todos">'
      + 'Ver todos (' + PAGOS_CACHE.length + ')'
      + '</button>'
      + '</div>';
  }

  div.innerHTML = html;
}

// ── Guardar pago ──────────────────────────────────────────────────
async function pagoGuardar() {
  var monto    = parseFloat(document.getElementById('pago-monto').value) || 0;
  var fecha    = document.getElementById('pago-fecha').value;
  var folio    = document.getElementById('pago-folio').value.trim();
  var cliente  = document.getElementById('pago-cliente').value.trim();
  var tel      = document.getElementById('pago-tel').value.trim();
  var desc     = document.getElementById('pago-desc').value.trim();
  var notas    = document.getElementById('pago-notas').value.trim();
  var factura  = document.getElementById('pago-factura') ? document.getElementById('pago-factura').value.trim() : '';
  var total    = parseFloat(document.getElementById('pago-total').value) || 0;
  var ant      = parseFloat(document.getElementById('pago-ant').value)   || 0;
  var concepto = document.getElementById('pago-concepto').value;
  var errEl    = document.getElementById('pago-error');

  errEl.classList.remove('visible');
  errEl.textContent = '';

  if (!monto || monto <= 0) { errEl.textContent = 'Ingresa el monto'; errEl.classList.add('visible'); return; }
  if (!fecha)               { errEl.textContent = 'Ingresa la fecha';  errEl.classList.add('visible'); return; }

  if (PRES_SEL && PRES_SEL.id) {
    const real = await recalcularSaldoReal(PRES_SEL.id);
    if (real) {
      if (monto > real.saldo) {
        errEl.textContent = 'El monto ($' + fmt(monto) + ') excede el saldo real ($' + fmt(real.saldo) + ')';
        errEl.classList.add('visible');
        return;
      }
      var saldo = Math.max(0, real.saldo - monto);
    } else {
      var saldo = Math.max(0, total - ant - monto);
    }
  } else {
    var saldo = Math.max(0, total - ant - monto);
  }

  var btn = document.getElementById('pago-btn');
  if (btn && btn.disabled) return;
  if (btn) { btn.disabled = true; btn.textContent = 'Generando recibo...'; }

  var folioRB = nextFolioRB();
  var notaPartes = [folio, cliente, notas];
  if (factura) notaPartes.push('FAC:' + factura);
  var nota = notaPartes.filter(Boolean).join(' | ');
  var notaConFolio = nota + (nota ? ' | ' : '') + 'RECIBO:' + folioRB;

  var db = {
    monto:         monto,
    fecha_pago:    fecha,
    forma_pago:    FORMA_SEL,
    concepto:      concepto,
    notas:         notaConFolio.slice(0, 500) || null,
    registrado_por:'campo',
    comprobante_img: _PAGO_FOTO || null,
    presupuesto_id: PRES_SEL && PRES_SEL.id ? PRES_SEL.id : null
  };

  var fLabels = { transferencia: 'Transferencia bancaria', efectivo: 'Efectivo', tarjeta: 'Tarjeta cr\u00e9dito/d\u00e9bito' };
  _RECIBO = generarRecibo({
    folioRB: folioRB, folio: folio, cliente: cliente, tel: tel, desc: desc,
    monto: monto, total: total, ant: ant, saldo: saldo,
    fecha: fecha, concepto: concepto, forma: FORMA_SEL,
    formaLabel: fLabels[FORMA_SEL] || FORMA_SEL,
    notas: notas, factura: factura, foto: _PAGO_FOTO
  });
  try { sessionStorage.setItem('barrcan_recibo_actual', _RECIBO); } catch(e) {}

  try {
    if (!SYNC.online || !sb()) {
      guardarOffline(db);
      mostrarPost(folioRB, monto, tel);
      pagoReset();
      if (btn) { btn.disabled = false; btn.textContent = 'Registrar Pago y Generar Recibo'; }
      return;
    }

    var result = await sb().from('pagos').insert([db]);
    if (result.error) throw result.error;

    var newPago = Object.assign({}, db, { created_at: new Date().toISOString() });
    if (result.data && result.data[0]) newPago.id = result.data[0].id;
    PAGOS_CACHE.unshift(newPago);
    localStorage.setItem('barrcan_pagos_cache', JSON.stringify(PAGOS_CACHE));
    resetPaginacion();

    if (PRES_SEL && PRES_SEL.id && sb()) {
      // 'entregado' significa que YA se hizo la entrega/instalación física
      // (lo marca entregas.html al generar el reporte) — antes, liquidar
      // el saldo aquí también ponía 'entregado', aunque la instalación no
      // se hubiera hecho todavía, y eso lo quitaba del dropdown de folios
      // en entregas.html sin haberse entregado de verdad. Ahora, liquidar
      // solo mueve a 'pendiente_entrega' (ya pagado, falta entregar).
      var nuevoEstado = PRES_SEL.estado === 'entregado' ? 'entregado'
        : saldo <= 0 ? 'pendiente_entrega'
        : PRES_SEL.estado === 'activo' ? 'aprobado'
        : PRES_SEL.estado;

      await sb().from('presupuestos_atrasados')
        .update({ saldo: saldo, estado: nuevoEstado })
        .eq('id', PRES_SEL.id);

      PRES_SEL.saldo = saldo;
      PRES_SEL.estado = nuevoEstado;
    }

    toast('Pago $' + fmt(monto) + ' registrado \u00b7 Recibo ' + folioRB);
    pagosRender();
    mostrarPost(folioRB, monto, tel);
    pagoReset();

  } catch(e) {
    console.warn('pagoGuardar error:', e.message);
    guardarOffline(db);
    mostrarPost(folioRB, monto, tel);
    pagoReset();
    toast('Error al guardar — se guardó localmente');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Registrar Pago y Generar Recibo'; }
  }
}

function guardarOffline(db) {
  try {
    var cola = JSON.parse(localStorage.getItem('barrcan_pagos_pend') || '[]');
    cola.push({ datos: db, ts: new Date().toISOString() });
    localStorage.setItem('barrcan_pagos_pend', JSON.stringify(cola));
    PAGOS_CACHE.unshift(Object.assign({}, db, { _pendiente: true, created_at: new Date().toISOString() }));
    localStorage.setItem('barrcan_pagos_cache', JSON.stringify(PAGOS_CACHE));
    resetPaginacion();
    pagosRender();
    toast('Pago guardado localmente');
  } catch(e) {}
}

async function pagoReintentarPendientes() {
  var cola = JSON.parse(localStorage.getItem('barrcan_pagos_pend') || '[]');
  if (!cola.length || !sb()) { toast('Sin pendientes'); return; }
  var ok = [];
  for (var i = 0; i < cola.length; i++) {
    try {
      var r = await sb().from('pagos').insert([cola[i].datos]);
      if (r.error) throw r.error;
      ok.push(cola[i]);
    } catch(e) { console.warn('reintento pago:', e.message); }
  }
  var rest = cola.filter(function(item) {
    for (var j = 0; j < ok.length; j++) { if (ok[j] === item) return false; }
    return true;
  });
  localStorage.setItem('barrcan_pagos_pend', JSON.stringify(rest));
  if (ok.length) {
    PAGOS_CACHE.forEach(function(p) { if (p._pendiente) delete p._pendiente; });
    localStorage.setItem('barrcan_pagos_cache', JSON.stringify(PAGOS_CACHE));
    resetPaginacion();
    toast(ok.length + ' pago(s) sincronizado(s)');
    pagosRender();
  }
  if (rest.length) toast(rest.length + ' aun pendiente(s)');

  var colaEdit = JSON.parse(localStorage.getItem('barrcan_pagos_edit_pend') || '[]');
  if (colaEdit.length && sb()) {
    var okEdit = [];
    for (var j = 0; j < colaEdit.length; j++) {
      try {
        var re2 = await sb().from('pagos').update(colaEdit[j].datos).eq('id', colaEdit[j].id);
        if (re2.error) throw re2.error;
        okEdit.push(colaEdit[j]);
      } catch(e2) { console.warn('reintento edicion:', e2.message); }
    }
    var restEdit = colaEdit.filter(function(x) { return okEdit.indexOf(x) < 0; });
    localStorage.setItem('barrcan_pagos_edit_pend', JSON.stringify(restEdit));
    if (okEdit.length) toast(okEdit.length + ' edicion(es) sincronizada(s)');
  }
}

  var meses = ['','enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    if (!iso) return '\u2014';
    var p = iso.split('-');
    return parseInt(p[2]) + ' de ' + meses[parseInt(p[1])] + ' de ' + p[0];
  }
  var sc = d.saldo <= 0 ? '#27AE60' : '#E67E22';
  var sboxHTML = d.total > 0
    ? '<div style="border:1.5px solid #E67E22;border-radius:5px;padding:8px 10px;background:#FEF9E7;margin:8px 0">'

      + '<div style="display:flex;justify-content:space-between;border-top:1px solid #E67E22;margin-top:4px;padding-top:4px">'
      + '<span style="font-size:8pt;font-weight:700">' + (d.saldo <= 0 ? 'LIQUIDADO' : 'Saldo') + '</span>'
      + '<span style="font-size:11pt;font-weight:800;color:' + sc + '">$' + fmt(d.saldo) + '</span></div></div>'
    : '';

  return '<!DOCTYPE html><html lang=es><head><meta charset=UTF-8>'
    + '<meta name=viewport content="width=device-width,initial-scale=1">'
    + '<style>'
    + '* { box-sizing:border-box; margin:0; padding:0 }'
    + 'body { font-family:Arial,sans-serif; font-size:9pt; color:#1B3A5C; background:white }'
    + '.pg { max-width:140mm; margin:0 auto; padding:10mm 10mm 20mm }'

    + '.barra { position:fixed; bottom:0; left:0; right:0; background:#1B3A5C; padding:6px 12px; display:flex; gap:8px; justify-content:center; z-index:999 }'
    + '.bp { padding:8px 18px; background:#C8923A; color:white; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer }'
    + '.bc { padding:8px 10px; background:rgba(255,255,255,.15); color:white; border:none; border-radius:6px; font-size:11px; cursor:pointer }'
    + '@media print { .barra { display:none!important } .pg { padding:5mm } }'

// ── Post pago ──────────────────────────────────────────────────────
function mostrarPost(folioRB, monto, tel) {
  var ov = document.getElementById('pago-post-ov');
  ov.dataset.tel = tel || '';
  document.getElementById('ppo-titulo').textContent = '$' + fmt(monto) + ' \u00b7 Recibo ' + folioRB;
  document.getElementById('ppo-wa').style.display = tel ? 'block' : 'none';
  ov.classList.add('visible');
}

function pagoPostCerrar() {
  document.getElementById('pago-post-ov').classList.remove('visible');
}

function verRecibo() {
  var html = _RECIBO;
  if (!html) {
    try { html = sessionStorage.getItem('barrcan_recibo_actual') || ''; } catch(e) {}
  }
  if (!html) { toast('El recibo no esta disponible en esta sesion'); return; }
  var win = window.open('', '_blank');
  if (win) { win.document.write(html); win.document.close(); }
  else {
    try {
      var blob = new Blob([html], { type: 'text/html' });
      var url  = URL.createObjectURL(blob);
      window.open(url, '_blank');
    } catch(e) { toast('Permite ventanas emergentes para ver el recibo'); }
  }
}

// ── Editar pago ──────────────────────────────────────────────────
function pagoAbrirEdicion(id) {
  var p = null;
  for (var i = 0; i < PAGOS_CACHE.length; i++) {
    if (PAGOS_CACHE[i].id === id) { p = PAGOS_CACHE[i]; break; }
  }
  if (!p) { toast('Pago no encontrado'); return; }
  EDIT_ID = id;
  document.getElementById('edit-monto').value = p.monto || '';
  document.getElementById('edit-fecha').value = p.fecha_pago || '';
  document.getElementById('edit-forma').value = p.forma_pago || 'transferencia';
  document.getElementById('edit-notas').value = p.notas || '';

  var numFolioEl = document.getElementById('edit-folio-num');
  if (numFolioEl) {
    var folioRaw = p.folio_rb || '';
    numFolioEl.value = folioRaw.replace('RB-', '') || '';
    numFolioEl.placeholder = folioRaw || 'Sin recibo asignado';
  }

  // Precargar comprobante existente (si lo hay) y resetear el estado de edición
  _PAGO_EDIT_FOTO = null;
  _PAGO_EDIT_FOTO_TOCADA = false;
  var editImg  = document.getElementById('edit-foto-img');
  var editPrev = document.getElementById('edit-foto-preview');
  if (p.comprobante_img) {
    if (editImg)  editImg.src = p.comprobante_img;
    if (editPrev) editPrev.classList.add('visible');
  } else {
    if (editImg)  editImg.src = '';
    if (editPrev) editPrev.classList.remove('visible');
  }

  document.getElementById('pago-edit-ov').classList.add('visible');
}

async function pagoEditarGuardar() {
  if (!EDIT_ID) return;
  var monto = parseFloat(document.getElementById('edit-monto').value) || 0;
  var fecha = document.getElementById('edit-fecha').value;
  var forma = document.getElementById('edit-forma').value;
  var notas = document.getElementById('edit-notas').value.trim();
  if (!monto) { toast('El monto es obligatorio'); return; }

  var numFolioEl = document.getElementById('edit-folio-num');
  var numFolioStr = numFolioEl ? numFolioEl.value.trim() : '';
  var numFolio = parseInt(numFolioStr, 10);
  var folioRB = null;
  if (numFolioStr !== '') {
    if (isNaN(numFolio) || numFolio <= 0 || String(numFolio) !== numFolioStr) {
      toast('El N° de recibo debe ser un número entero positivo');
      return;
    }
    folioRB = 'RB-' + numFolio;
    var actual = parseInt(localStorage.getItem('barrcan_folio_rb') || '0');
    if (numFolio > actual) {
      localStorage.setItem('barrcan_folio_rb', String(numFolio));
      localStorage.setItem('barrcan_ultimo_folio_recibo', String(numFolio));
    }
  }

  var upd = { monto: monto, fecha_pago: fecha, forma_pago: forma, notas: notas || null };
  if (_PAGO_EDIT_FOTO_TOCADA) upd.comprobante_img = _PAGO_EDIT_FOTO || null;
  var updLocal = Object.assign({}, upd);
  if (folioRB) updLocal.folio_rb = folioRB;

  for (var i = 0; i < PAGOS_CACHE.length; i++) {
    if (PAGOS_CACHE[i].id === EDIT_ID) {
      PAGOS_CACHE[i] = Object.assign({}, PAGOS_CACHE[i], updLocal);
      break;
    }
  }
  localStorage.setItem('barrcan_pagos_cache', JSON.stringify(PAGOS_CACHE));
  resetPaginacion();
  pagosRender();
  document.getElementById('pago-edit-ov').classList.remove('visible');

  if (SYNC.online && sb()) {
    try {
      var res = await sb().from('pagos').update(upd).eq('id', EDIT_ID);
      if (res.error) throw res.error;
      toast('Pago actualizado');
    } catch(e) {
      var colaEdit = JSON.parse(localStorage.getItem('barrcan_pagos_edit_pend') || '[]');
      colaEdit.push({ id: EDIT_ID, datos: upd, ts: new Date().toISOString() });
      localStorage.setItem('barrcan_pagos_edit_pend', JSON.stringify(colaEdit));
      toast('Error al actualizar — se reintentara al reconectar');
    }
  } else {
    var colaEdit = JSON.parse(localStorage.getItem('barrcan_pagos_edit_pend') || '[]');
    colaEdit.push({ id: EDIT_ID, datos: upd, ts: new Date().toISOString() });
    localStorage.setItem('barrcan_pagos_edit_pend', JSON.stringify(colaEdit));
    toast('Actualizado localmente — se sincronizará al reconectar');
  }
  EDIT_ID = null;
  _PAGO_EDIT_FOTO = null;
  _PAGO_EDIT_FOTO_TOCADA = false;
}

function pagoEditarReimprimir() {
  if (!EDIT_ID) return;
  var p = null;
  for (var i = 0; i < PAGOS_CACHE.length; i++) {
    if (PAGOS_CACHE[i].id === EDIT_ID) { p = PAGOS_CACHE[i]; break; }
  }
  if (!p) { toast('No se encontró el pago'); return; }

  var numFolioEl = document.getElementById('edit-folio-num');
  var numFolio   = numFolioEl ? numFolioEl.value.trim() : '';
  var folioRB    = numFolio ? 'RB-' + numFolio : (p.folio_rb || 'RB-?');

  var partes  = (p.notas || '').split('|').map(function(s) { return s.trim(); });
  var folio   = partes[0] || '';
  var cliente = partes[1] || '';
  var factura = '';
  var notaLimpia = '';
  partes.forEach(function(parte) {
    if (parte.indexOf('FAC:') === 0)    { factura = parte.replace('FAC:', '').trim(); }
    else if (parte.indexOf('RECIBO:') === 0) { /* saltar */ }
    else if (parte !== folio && parte !== cliente) { notaLimpia += (notaLimpia ? ' | ' : '') + parte; }
  });

  var fLabels = { transferencia: 'Transferencia bancaria', efectivo: 'Efectivo', tarjeta: 'Tarjeta crédito/débito' };
  var html = generarRecibo({
    folioRB:    folioRB,
    folio:      folio,
    cliente:    cliente,
    tel:        '',
    desc:       '',
    monto:      parseFloat(p.monto) || 0,
    total:      0,
    ant:        0,
    saldo:      0,
    fecha:      p.fecha_pago || '',
    concepto:   p.concepto || '',
    forma:      p.forma_pago || '',
    formaLabel: fLabels[p.forma_pago] || p.forma_pago || '',
    notas:      notaLimpia,
    factura:    factura,
    foto:       p.comprobante_img || null
  });

  _RECIBO = html;
  try { sessionStorage.setItem('barrcan_recibo_actual', html); } catch(e) {}

  var win = window.open('', '_blank');
  if (win) { win.document.write(html); win.document.close(); }
  else {
    try {
      var blob = new Blob([html], { type: 'text/html' });
      window.open(URL.createObjectURL(blob), '_blank');
    } catch(e) { toast('Permite ventanas emergentes'); }
  }
}

// ── Reset ─────────────────────────────────────────────────────────
function pagoReset() {
  _PAGO_FOTO = null;
  document.getElementById('pago-foto-img').src = '';
  document.getElementById('pago-foto-preview').classList.remove('visible');
  document.getElementById('pago-factura').value = '';
  ['pago-folio','pago-cliente','pago-tel','pago-desc','pago-notas','pago-monto','pago-total','pago-ant'].forEach(function(cid) {
    var el = document.getElementById(cid); if (el) el.value = '';
  });
  document.getElementById('pago-fecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('pago-concepto').value = 'anticipo';
  var saldoEl = document.getElementById('pago-saldo');
  saldoEl.textContent = '$0';
  saldoEl.className = 'pago-saldo-display';
  document.getElementById('pago-error').classList.remove('visible');
  document.getElementById('pago-error').textContent = '';
  document.getElementById('pago-pres-card').classList.remove('visible');
  document.getElementById('pago-pres').value = '';
  PRES_SEL = null;
  FORMA_SEL = 'transferencia';
  document.querySelectorAll('.pf-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === 0);
  });
}
