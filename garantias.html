<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BarrCan &middot; Garant&iacute;as</title>
<!--
  BARRCAN · MODULO: GARANTÍAS Y POSTVENTA (standalone)
  VERSION : v1.1.1
  FECHA   : 2026-07-22
  v1.1 - Dirección de obra autocompletada por teléfono (cruce con
    clientes) + visible en tarjeta y detalle del ticket.
  VERSION : v1.0
  FECHA   : 2026-07-18
  v1.0 - Creación inicial (extraído del archivo base barrcan_app.html).
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --navy: #1B3A5C;
  --blue: #2E6DA4;
  --gold: #C8923A;
  --gold-light: #E8B96A;
  --orange: #FF6600;
  --white: #FFFFFF;
  --off-white: #F7F5F0;
  --gray-100: #F0EDE8;
  --gray-200: #DDD9D2;
  --gray-400: #9A9590;
  --gray-600: #5A5652;
  --green: #2D7D46;
  --red: #C0392B;
  --amber: #E67E22;
  --shadow-sm: 0 2px 8px rgba(27,58,92,0.08);
  --shadow-md: 0 8px 32px rgba(27,58,92,0.14);
  --shadow-lg: 0 20px 60px rgba(27,58,92,0.20);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--off-white);
  color: var(--navy);
  overscroll-behavior: none;
}

#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header {
  background: var(--navy);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  position: relative;
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 16px;
  color: var(--navy);
  letter-spacing: -0.5px;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--white);
  letter-spacing: 0.5px;
}
.logo-sub {
  font-size: 9px;
  color: var(--gold-light);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: block;
  margin-top: -3px;
}
.offline-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(200,146,58,0.15);
  border: 1px solid rgba(200,146,58,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--gold-light);
  font-weight: 500;
}
.offline-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold-light);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.screen { display: none; padding: 16px; }
.screen.active { display: block; }

.orden-filtro-btn {
  padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray-200);
  background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  color:var(--gray-400);cursor:pointer;white-space:nowrap;transition:all 0.15s;
}
.orden-filtro-btn.active {
  background:var(--navy);color:#fff;border-color:var(--navy);
}

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.section-sub {
  font-size: 12px;
  color: var(--gray-400);
  margin-bottom: 16px;
  letter-spacing: 0.3px;
}

.wizard-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 5px;
  letter-spacing: 0.3px;
}
.form-input, .form-select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--navy);
  background: var(--off-white);
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(46,109,164,0.12);
  background: var(--white);
}

.form-select-wrap { position: relative; }
.form-select-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--blue);
  pointer-events: none;
  font-size: 14px;
}
select.form-select { padding-right: 36px; cursor: pointer; }

.btn-calcular {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--orange), #FF8533);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(255,102,0,0.35);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.desglose-card {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

.config-item {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
}

.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.slide-up { animation: slideUp 0.35s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.shake { animation: shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--navy);
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
<style>
body{min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}
.content{flex:1;padding:16px;max-width:640px;margin:0 auto;width:100%;box-sizing:border-box}
.filtro-btn{padding:7px 14px;border:1.5px solid var(--gray-200);border-radius:20px;background:var(--white);font-size:12px;font-weight:600;color:var(--gray-600);white-space:nowrap;cursor:pointer}
.filtro-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.gtia-prior-btn{padding:10px 4px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:12px;font-weight:700;color:var(--gray-400);font-family:'DM Sans',sans-serif}
.ticket-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="logo-mark" style="padding:0;overflow:hidden">
        <img src="https://barrcan.github.io/barrcan-app/assets/logo-icono.jpg" onerror="this.onerror=null;this.src=_LOGO_ICONO_B64;" style="width:100%;height:100%;object-fit:cover;display:block">
      </div>
      <div><span class="logo-text">BarrCan</span><span class="logo-sub">Garant&iacute;as &middot; Postventa</span></div>
    </div>
    <div class="offline-badge">
      <div class="offline-dot"></div>
      <span id="conn-status">Offline-First</span>
    </div>
  </div>

  <div class="content">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <p class="section-title" style="margin-bottom:2px">Garant&iacute;as y Postventa</p>
        <p class="section-sub" style="margin:0">Tickets de servicio &middot; Reportes de clientes</p>
      </div>
      <button onclick="garantiaAbrir()" style="padding:9px 14px;background:var(--navy);color:white;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer">+ Ticket</button>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px">
      <button class="filtro-btn active" data-filtro="todos" onclick="garantiasFiltrar(this)">Todos</button>
      <button class="filtro-btn" data-filtro="urgente" onclick="garantiasFiltrar(this)">&#128308; Urgente</button>
      <button class="filtro-btn" data-filtro="medio" onclick="garantiasFiltrar(this)">&#128993; Medio</button>
      <button class="filtro-btn" data-filtro="normal" onclick="garantiasFiltrar(this)">&#128994; Normal</button>
      <button class="filtro-btn" data-filtro="resuelto" onclick="garantiasFiltrar(this)">&#9989; Resuelto</button>
    </div>

    <div id="garantias-lista">
      <div style="text-align:center;padding:40px;color:var(--gray-400)">
        <div style="font-size:40px;margin-bottom:10px">&#128737;&#65039;</div>
        <div>Cargando...</div>
      </div>
    </div>

  </div>
</div>

<!-- ═══════ MODAL: NUEVO TICKET ═══════ -->
<div id="garantia-modal-overlay" onclick="garantiaCerrar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:800;backdrop-filter:blur(3px)"></div>
<div id="garantia-modal" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-radius:20px 20px 0 0;z-index:900;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.3)">
  <div style="padding:16px 20px 40px">
    <div style="width:40px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px">Nuevo Ticket de Garant&iacute;a</div>

    <div class="form-group">
      <label class="form-label">Cliente *</label>
      <input type="text" id="gtia-cliente" class="form-input" placeholder="Nombre del cliente">
    </div>
    <div class="form-group">
      <label class="form-label">Tel&eacute;fono *</label>
      <input type="tel" id="gtia-tel" class="form-input" placeholder="55 1234 5678" inputmode="tel" onblur="gtiaBuscarPorTelefono()">
    </div>
    <div class="form-group">
      <label class="form-label">Folio de contrato (si recuerda)</label>
      <input type="text" id="gtia-folio" class="form-input" placeholder="CACN-...">
    </div>

    <div class="form-group">
      <label class="form-label">Direcci&oacute;n de la obra</label>
      <input type="text" id="gtia-dir" class="form-input" placeholder="Se autocompleta si el tel&eacute;fono coincide con un cliente">
      <div id="gtia-dir-hint" style="font-size:10px;color:var(--gray-400);margin-top:3px;display:none"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Tipo de problema *</label>
      <div class="form-select-wrap">
        <select id="gtia-tipo" class="form-select" onchange="gtiaActualizarPrioridad()">
          <optgroup label="&#128308; Urgente">
            <option value="filtracion">Filtraci&oacute;n de agua</option>
            <option value="vidrio_roto">Vidrio roto</option>
            <option value="no_cierra">No cierra / no abre</option>
            <option value="seguridad">Problema de seguridad</option>
          </optgroup>
          <optgroup label="&#128993; Medio">
            <option value="herraje_danado">Herraje da&ntilde;ado</option>
            <option value="ruido">Ruido al abrir/cerrar</option>
            <option value="mosquitero">Mosquitero roto</option>
            <option value="condensacion">Condensaci&oacute;n</option>
          </optgroup>
          <optgroup label="&#128994; Normal">
            <option value="ajuste">Ajuste menor</option>
            <option value="silicon">Silic&oacute;n despegado</option>
            <option value="limpieza">Limpieza / mantenimiento</option>
            <option value="revision">Revisi&oacute;n general</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Prioridad</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <button type="button" class="gtia-prior-btn" data-prior="urgente" onclick="gtiaSelPrioridad(this)">&#128308; Urgente</button>
        <button type="button" class="gtia-prior-btn" data-prior="medio" onclick="gtiaSelPrioridad(this)">&#128993; Medio</button>
        <button type="button" class="gtia-prior-btn" data-prior="normal" onclick="gtiaSelPrioridad(this)">&#128994; Normal</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Descripci&oacute;n del problema *</label>
      <textarea id="gtia-desc" class="form-input" rows="3" placeholder="Describe qu&eacute; est&aacute; pasando con detalle..." style="resize:none"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Fecha de instalaci&oacute;n aprox.</label>
        <input type="date" id="gtia-fecha-inst" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Disponibilidad visita</label>
        <div class="form-select-wrap">
          <select id="gtia-disponibilidad" class="form-select">
            <option value="manana">Ma&ntilde;ana (8-2pm)</option>
            <option value="tarde">Tarde (2-6pm)</option>
            <option value="sabado">S&aacute;bado</option>
            <option value="coordinar">A coordinar</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Fotos / evidencia</label>
      <input type="file" id="gtia-fotos-input" accept="image/*,video/*" multiple style="display:none" onchange="gtiaAgregarEvidencia(this)">
      <button type="button" onclick="document.getElementById('gtia-fotos-input').click()" style="width:100%;padding:12px;background:var(--off-white);border:1.5px dashed var(--gray-200);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--gray-400)">&#128247; Agregar fotos o video</button>
      <div id="gtia-evidencia-preview" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px"></div>
    </div>

    <div id="gtia-error" style="display:none;color:var(--red);font-size:12px;padding:8px 12px;background:rgba(192,57,43,0.08);border-radius:var(--radius-sm);margin-bottom:12px"></div>

    <button onclick="gtiaGuardar()" style="width:100%;padding:14px;background:linear-gradient(135deg,#E74C3C,#C0392B);color:white;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(231,76,60,0.35)">&#128737;&#65039; CREAR TICKET</button>
  </div>
</div>

<!-- ═══════ MODAL: DETALLE / GESTIÓN ═══════ -->
<div id="gtia-det-overlay" onclick="gtiaDetCerrar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;backdrop-filter:blur(3px)"></div>
<div id="gtia-det-modal" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-radius:20px 20px 0 0;z-index:1001;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.3)">
  <input type="hidden" id="gtia-det-id">
  <div style="padding:16px 20px 40px">
    <div style="width:40px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 16px"></div>

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy)" id="gtia-det-nombre">&mdash;</div>
        <div style="font-size:12px;color:var(--gray-400);margin-top:2px" id="gtia-det-tel">&mdash;</div>
      </div>
      <span id="gtia-det-prior" style="font-size:12px;font-weight:700"></span>
    </div>

    <div style="background:var(--off-white);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-400);margin-bottom:8px">Reporte del cliente</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
        <div><span style="color:var(--gray-400)">Tipo: </span><span id="gtia-det-tipo" style="font-weight:600;color:var(--navy)">&mdash;</span></div>
        <div><span style="color:var(--gray-400)">Folio: </span><span id="gtia-det-folio" style="font-weight:600;color:var(--blue);font-family:monospace">&mdash;</span></div>
        <div><span style="color:var(--gray-400)">Instalaci&oacute;n: </span><span id="gtia-det-fecha-inst" style="font-weight:600;color:var(--navy)">&mdash;</span></div>
        <div><span style="color:var(--gray-400)">Disponibilidad: </span><span id="gtia-det-disp" style="font-weight:600;color:var(--navy)">&mdash;</span></div>
        <div style="grid-column:1/-1"><span style="color:var(--gray-400)">&#128205; Direcci&oacute;n: </span><span id="gtia-det-dir" style="font-weight:600;color:var(--navy)">&mdash;</span></div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--gray-600);line-height:1.5" id="gtia-det-desc">&mdash;</div>
      <div id="gtia-det-fotos" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px"></div>
    </div>

    <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--blue);margin-bottom:10px">Gesti&oacute;n interna</div>

    <div class="form-group">
      <label class="form-label">Estado del ticket</label>
      <div class="form-select-wrap">
        <select id="gtia-det-estado" class="form-select">
          <option value="nuevo">&#127991;&#65039; Nuevo</option>
          <option value="en_revision">&#128269; En revisi&oacute;n</option>
          <option value="visita_agendada">&#128197; Visita agendada</option>
          <option value="resuelto">&#9989; Resuelto</option>
          <option value="cerrado">&#128274; Cerrado</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">T&eacute;cnico asignado</label>
        <select id="gtia-det-tecnico" class="form-select">
          <option value="">&mdash; Sin asignar &mdash;</option>
          <option value="ESAU">Esa&uacute;</option>
          <option value="MIGUEL">Miguel</option>
          <option value="CARLOS">Carlos</option>
          <option value="OMAR">Omar</option>
          <option value="RODRIGO">Rodrigo</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de visita</label>
        <input type="date" id="gtia-det-fecha-vis" class="form-input">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Costo de reparaci&oacute;n (si aplica)</label>
      <input type="number" id="gtia-det-costo" class="form-input" placeholder="0" min="0" inputmode="numeric">
      <div style="font-size:10px;color:var(--gray-400);margin-top:3px">Dejar vac&iacute;o si est&aacute; cubierto por garant&iacute;a</div>
    </div>

    <div class="form-group">
      <label class="form-label">Notas internas</label>
      <textarea id="gtia-det-notas" class="form-input" rows="3" placeholder="Diagn&oacute;stico, materiales usados, acciones realizadas..." style="resize:none"></textarea>
    </div>

    <div id="gtia-det-error" style="display:none;color:var(--red);font-size:12px;padding:8px 12px;background:rgba(192,57,43,0.08);border-radius:var(--radius-sm);margin-bottom:12px"></div>

async function gtiaSubirEvidencias(ticketId) {
  if (!GTIA_EVIDENCIAS.length || !sb()) return [];
  var urls = [];
  for (var i = 0; i < GTIA_EVIDENCIAS.length; i++) {
    try {
      var e = GTIA_EVIDENCIAS[i];
      var blob = await (await fetch(e.dataUrl)).blob();
      var ext = (e.nombre && e.nombre.indexOf('.') >= 0) ? e.nombre.split('.').pop() : (e.tipo.indexOf('video') === 0 ? 'mp4' : 'jpg');
      var nombreArch = 'garantia_' + ticketId + '_' + i + '_' + Date.now() + '.' + ext;
      var up = await sb().storage.from('reportes').upload(nombreArch, blob, { contentType: e.tipo, upsert: true });
      if (up.error) throw up.error;
      var urlRes = sb().storage.from('reportes').getPublicUrl(nombreArch);
      if (urlRes.data) urls.push(urlRes.data.publicUrl);
    } catch(err) { console.warn('[BarrCan] No se pudo subir una evidencia:', err); }
  }
  return urls;
}

}
