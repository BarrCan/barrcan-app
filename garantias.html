<title>BarrCan &middot; Garant&iacute;as</title>
<!--
  BARRCAN · MODULO: GARANTÍAS Y POSTVENTA (standalone)
  VERSION : v1.1
  FECHA   : 2026-07-23
  v1.1 - Actualización de identificación
  v1.0 - Creación inicial (extraído del archivo base barrcan_app.html):
    - Conectado a la tabla real "garantias" (ya existía en Supabase con
      11 tickets reales -- este módulo era el único que faltaba para
      poder verlos y gestionarlos).
    - Mismo formulario del archivo base: cliente, tipo de problema (con
      prioridad automática urgente/medio/normal), descripción, fecha de
      instalación, disponibilidad, fotos/evidencia.
    - Gestión interna: estado del ticket, técnico asignado, fecha de
      visita, costo de reparación, notas internas. Al agendar visita,
      ofrece avisar al cliente por WhatsApp.
    - Mejoras sobre el archivo base:
      - Técnico asignado ahora es un selector dinámico conectado con
        tecnicos.html (antes era una lista fija TEC1/TEC2/MAU/HER).
      - Las fotos de evidencia ahora SÍ se guardan de verdad (se suben a
        Storage) -- en el archivo base se veían en el formulario pero
        nunca llegaban a fotos_urls, se perdían al cerrar.
      - "Registrado por" se llena solo con la persona que inició sesión
        en el portal (barrcan_usuario_activo), no había ese dato antes.
    - Requiere el SQL adjunto solo para el permiso de Storage de fotos
      (la tabla y sus políticas principales ya existían).
-->

// ── Configuración de prioridad y estilos ──
var GTIA_PRIORIDAD_MAP = {
  filtracion:'urgente', vidrio_roto:'urgente', no_cierra:'urgente', seguridad:'urgente',
  herraje_danado:'medio', ruido:'medio', mosquitero:'medio', condensacion:'medio',
  ajuste:'normal', silicon:'normal', limpieza:'normal', revision:'normal'
};
var GTIA_PRIOR_STYLE = {
  urgente: { emoji:'🔴', color:'#E74C3C', bg:'rgba(231,76,60,0.1)'  },
  medio:   { emoji:'🟡', color:'#F39C12', bg:'rgba(243,156,18,0.1)' },
  normal:  { emoji:'🟢', color:'#27AE60', bg:'rgba(39,174,96,0.1)'  }
};
var GARANTIAS_CACHE = [];
var GARANTIA_FILTRO = 'todos';
var GTIA_PRIOR_SEL  = 'urgente';
var GTIA_EVIDENCIAS = [];

function gtiaActualizarPrioridad() {
  var tipo = document.getElementById('gtia-tipo').value;
  gtiaSelPrioridadById(GTIA_PRIORIDAD_MAP[tipo] || 'normal');
}
function gtiaSelPrioridadById(prior) {
  var btn = document.querySelector('.gtia-prior-btn[data-prior="' + prior + '"]');
  if (btn) gtiaSelPrioridad(btn);
}
function gtiaSelPrioridad(btn) {
  GTIA_PRIOR_SEL = btn.dataset.prior;
  var st = GTIA_PRIOR_STYLE[GTIA_PRIOR_SEL] || GTIA_PRIOR_STYLE.normal;
  document.querySelectorAll('.gtia-prior-btn').forEach(function(b) {
    var activo = b === btn;
    b.style.borderColor = activo ? st.color : 'var(--gray-200)';
    b.style.background  = activo ? st.bg    : 'none';
    b.style.color       = activo ? st.color : 'var(--gray-400)';
  });
}

// ── Evidencia (fotos/video) — en memoria hasta guardar, luego se suben de verdad ──
function gtiaAgregarEvidencia(input) {
  if (!input || !input.files) return;
  for (var i = 0; i < input.files.length; i++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        GTIA_EVIDENCIAS.push({ dataUrl: e.target.result, tipo: file.type, nombre: file.name });
        gtiaRenderEvidencias();
      };
      reader.readAsDataURL(file);
    })(input.files[i]);
  }
  input.value = '';
}
function gtiaRenderEvidencias() {
  var cont = document.getElementById('gtia-evidencia-preview');
  cont.innerHTML = GTIA_EVIDENCIAS.map(function(e, i) {
    var media = e.tipo.indexOf('video') === 0
      ? '<video src="' + e.dataUrl + '" style="width:100%;height:80px;object-fit:cover;border-radius:6px"></video>'
      : '<img src="' + e.dataUrl + '" style="width:100%;height:80px;object-fit:cover;border-radius:6px">';
    return '<div style="position:relative">' + media
      + '<button type="button" onclick="gtiaQuitarEvidencia(' + i + ')" style="position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;border:none;background:rgba(0,0,0,0.6);color:white;font-size:11px;cursor:pointer">&times;</button></div>';
  }).join('');
}
function gtiaQuitarEvidencia(i) { GTIA_EVIDENCIAS.splice(i, 1); gtiaRenderEvidencias(); }

// Sube las fotos/video a Storage de verdad (en el archivo base se
// quedaban solo en memoria y se perdían -- nunca llegaban a fotos_urls).
async function gtiaSubirEvidencias(ticketId) {
  if (!GTIA_EVIDENCIAS.length || !sb()) return [];
  var urls = [];
  for (var i = 0; i < GTIA_EVIDENCIAS.length; i++) {
    try {
      var e = GTIA_EVIDENCIAS[i];
      var blob = await (await fetch(e.dataUrl)).blob();
      var ext = (e.nombre && e.nombre.indexOf('.') >= 0) ? e.nombre.split('.').pop() : (e.tipo.indexOf('video') === 0 ? 'mp4' : 'jpg');
      var nombreArch = 'garantia_' + ticketId + '_' + i + '_' + Date.now() + '.' + ext;
      var up = await sb().storage.from('reportes').upload(nombreArch, blob, { contentType: e.tipo, upsert: true });
      if (up.error) throw up.error;
      var urlRes = sb().storage.from('reportes').getPublicUrl(nombreArch);
      if (urlRes.data) urls.push(urlRes.data.publicUrl);
    } catch(err) { console.warn('[BarrCan] No se pudo subir una evidencia:', err); }
  }
  return urls;
}

// ── Técnico dinámico (mismo patrón que ordenes.html/entregas.html/visitas.html) ──
async function gtiaCargarTecnicosDinamico() {
  var sel = document.getElementById('gtia-det-tecnico');
  if (!sel || !sb()) return;
  try {
    var res = await sb().from('tecnicos').select('nombre_completo,tecnico_id_login')
      .eq('activo', true).eq('eliminado', false).order('nombre_completo');
    if (res.error) throw res.error;
    var datos = (res.data || []).filter(function(t) { return t.tecnico_id_login; });
    if (!datos.length) return;
    var valorPrevio = sel.value;
    sel.innerHTML = '<option value="">-- Sin asignar --</option>'
      + datos.map(function(t) { return '<option value="' + t.tecnico_id_login + '">' + t.nombre_completo + '</option>'; }).join('');
    if (valorPrevio) sel.value = valorPrevio;
  } catch(e) { console.warn('[BarrCan] No se pudo cargar técnicos:', e); }
}

// ── Cargar / listar tickets ──
async function garantiasCargar() {
  var cache = JSON.parse(localStorage.getItem('barrcan_garantias_cache') || '[]');
  if (cache.length) { GARANTIAS_CACHE = cache; garantiasRenderLista(); }
  if (!sb()) return;
  try {
    var res = await sb().from('garantias').select('*').order('created_at', { ascending: false });
    if (res.error) throw res.error;
    GARANTIAS_CACHE = res.data || [];
    localStorage.setItem('barrcan_garantias_cache', JSON.stringify(GARANTIAS_CACHE));
    garantiasRenderLista();
  } catch(e) { console.warn('[Garantias]', e.message); }
}

function garantiasRenderLista() {
  var lista = document.getElementById('garantias-lista');
  if (!lista) return;
  var filtradas = GARANTIAS_CACHE;
  if (GARANTIA_FILTRO !== 'todos') {
    filtradas = GARANTIAS_CACHE.filter(function(g) {
      return GARANTIA_FILTRO === 'resuelto' ? g.estado === 'resuelto' : g.prioridad === GARANTIA_FILTRO;
    });
  }
  if (!filtradas.length) {
    lista.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400)"><div style="font-size:40px;margin-bottom:10px">🛡️</div><div>Sin tickets en esta categoría</div></div>';
    return;
  }
  var estadoLabels = { nuevo:'🆕 Nuevo', en_revision:'🔍 En revisión', visita_agendada:'📅 Visita agendada', resuelto:'✅ Resuelto', cerrado:'🔒 Cerrado' };

  lista.innerHTML = filtradas.map(function(g) {
    var st = GTIA_PRIOR_STYLE[g.prioridad] || GTIA_PRIOR_STYLE.normal;
    var estLabel = estadoLabels[g.estado] || g.estado;
    var descCorta = (g.descripcion || '').slice(0, 80) + ((g.descripcion || '').length > 80 ? '…' : '');
    return '<div class="ticket-card" onclick="gtiaAbrirDetalle(\'' + g.id + '\')" style="border-left:5px solid ' + st.color + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'
      + '<div style="font-size:15px;font-weight:700;color:var(--navy)">' + esc(g.cliente_nombre) + '</div>'
      + '<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;background:' + st.bg + ';color:' + st.color + '">' + st.emoji + ' ' + (g.prioridad || '').toUpperCase() + '</span>'
      + '</div>'
      + '<div style="font-size:12px;color:var(--gray-600);margin-bottom:4px">' + esc(g.tipo_problema || '—') + '</div>'
      + '<div style="font-size:11px;color:var(--gray-400)">' + esc(descCorta) + '</div>'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">'
      + '<span style="font-size:10px;color:var(--gray-400)">' + estLabel + '</span>'
      + '<div style="display:flex;gap:6px">'
      + (g.cliente_tel ? '<span style="font-size:11px;background:#F3F4F6;color:var(--gray-600);padding:2px 7px;border-radius:4px">📞 ' + esc(g.cliente_tel) + '</span>' : '')
      + (g.fecha_visita_agendada ? '<span style="font-size:11px;background:rgba(46,109,164,0.08);color:var(--blue);padding:2px 7px;border-radius:4px">📅 ' + g.fecha_visita_agendada + '</span>' : '')
      + (g.costo_reparacion ? '<span style="font-size:11px;background:rgba(39,174,96,0.08);color:var(--green);padding:2px 7px;border-radius:4px">$' + fmt(g.costo_reparacion) + '</span>' : '')
      + '</div></div></div>';
  }).join('');
}

function garantiasFiltrar(btn) {
  GARANTIA_FILTRO = btn.dataset.filtro;
  document.querySelectorAll('.filtro-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  garantiasRenderLista();
}

// ── Nuevo ticket ──
function garantiaAbrir() {
  GTIA_PRIOR_SEL = 'urgente'; GTIA_EVIDENCIAS = [];
  ['gtia-cliente','gtia-tel','gtia-folio','gtia-desc'].forEach(function(f) { document.getElementById(f).value = ''; });
  document.getElementById('gtia-fecha-inst').value = '';
  document.getElementById('gtia-evidencia-preview').innerHTML = '';
  document.getElementById('gtia-error').style.display = 'none';
  gtiaSelPrioridadById('urgente');
  document.getElementById('garantia-modal-overlay').style.display = 'block';
  document.getElementById('garantia-modal').style.display = 'block';
}
function garantiaCerrar() {
  document.getElementById('garantia-modal-overlay').style.display = 'none';
  document.getElementById('garantia-modal').style.display = 'none';
}

async function gtiaGuardar() {
  var cliente = document.getElementById('gtia-cliente').value.trim();
  var tel = document.getElementById('gtia-tel').value.trim();
  var desc = document.getElementById('gtia-desc').value.trim();
  var errEl = document.getElementById('gtia-error');
  if (!cliente) { errEl.textContent = '⚠️ Nombre obligatorio'; errEl.style.display = 'block'; return; }
  if (!tel) { errEl.textContent = '⚠️ Teléfono obligatorio'; errEl.style.display = 'block'; return; }
  if (!desc) { errEl.textContent = '⚠️ Describe el problema'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  var payload = {
    cliente_nombre: cliente, cliente_tel: tel,
    folio_contrato: document.getElementById('gtia-folio').value.trim() || null,
    tipo_problema: document.getElementById('gtia-tipo').value,
    prioridad: GTIA_PRIOR_SEL, descripcion: desc,
    fecha_instalacion: document.getElementById('gtia-fecha-inst').value || null,
    disponibilidad: document.getElementById('gtia-disponibilidad').value,
    estado: 'nuevo', registrado_por: usuarioActivo().id || 'desconocido',
    num_evidencias: GTIA_EVIDENCIAS.length
  };
  try {
    if (!sb()) throw new Error('Sin conexión a Supabase');
    var res = await sb().from('garantias').insert([payload]).select().single();
    if (res.error) throw res.error;
    var nuevoId = res.data.id;
    if (GTIA_EVIDENCIAS.length) {
      var urls = await gtiaSubirEvidencias(nuevoId);
      if (urls.length) await sb().from('garantias').update({ fotos_urls: urls }).eq('id', nuevoId);
    }
    toast('🛡️ Ticket creado — prioridad ' + GTIA_PRIOR_SEL);
    garantiaCerrar();
    await garantiasCargar();
    gtiaNotificarWhatsApp(payload);
  } catch(e) {
    var local = JSON.parse(localStorage.getItem('barrcan_garantias_cache') || '[]');
    var offlineTicket = Object.assign({}, payload, { id: 'local_' + Date.now(), created_at: new Date().toISOString() });
    local.unshift(offlineTicket);
    localStorage.setItem('barrcan_garantias_cache', JSON.stringify(local));
    GARANTIAS_CACHE = local;
    garantiasRenderLista();
    toast('💾 Ticket guardado localmente — se reintentará al reconectar');
    garantiaCerrar();
  }
}

function gtiaNotificarWhatsApp(g) {
  var st = GTIA_PRIOR_STYLE[g.prioridad] || GTIA_PRIOR_STYLE.normal;
  var msg = encodeURIComponent(
    st.emoji + ' *TICKET GARANTÍA BarrCan*\n' +
    'Cliente: ' + g.cliente_nombre + ' · ' + g.cliente_tel + '\n' +
    'Problema: ' + g.tipo_problema + '\n' +
    g.descripcion + '\n' +
    (g.folio_contrato ? 'Folio: ' + g.folio_contrato + '\n' : '') +
    'Disponibilidad: ' + g.disponibilidad + '\n' +
    'Prioridad: ' + (g.prioridad || '').toUpperCase()
  );
  window.open('https://wa.me/525615158415?text=' + msg, '_blank');
}

// ── Detalle / gestión ──
function gtiaAbrirDetalle(id) {
  var g = GARANTIAS_CACHE.filter(function(x) { return x.id === id; })[0];
  if (!g) return;
  var st = GTIA_PRIOR_STYLE[g.prioridad] || GTIA_PRIOR_STYLE.normal;
  document.getElementById('gtia-det-id').value = g.id;
  document.getElementById('gtia-det-nombre').textContent = g.cliente_nombre || '—';
  document.getElementById('gtia-det-tel').textContent = g.cliente_tel || '—';
  document.getElementById('gtia-det-folio').textContent = g.folio_contrato || '—';
  document.getElementById('gtia-det-tipo').textContent = g.tipo_problema || '—';
  document.getElementById('gtia-det-prior').textContent = st.emoji + ' ' + (g.prioridad || '').toUpperCase();
  document.getElementById('gtia-det-prior').style.color = st.color;
  document.getElementById('gtia-det-desc').textContent = g.descripcion || '—';
  document.getElementById('gtia-det-disp').textContent = g.disponibilidad || '—';
  document.getElementById('gtia-det-fecha-inst').textContent = g.fecha_instalacion || '—';
  document.getElementById('gtia-det-estado').value = g.estado || 'nuevo';
  document.getElementById('gtia-det-tecnico').value = g.tecnico_asignado || '';
  document.getElementById('gtia-det-fecha-vis').value = g.fecha_visita_agendada || '';
  document.getElementById('gtia-det-costo').value = g.costo_reparacion || '';
  document.getElementById('gtia-det-notas').value = g.notas_internas || '';
  document.getElementById('gtia-det-error').style.display = 'none';

  var fotosDiv = document.getElementById('gtia-det-fotos');
  var fotos = g.fotos_urls || [];
  fotosDiv.innerHTML = fotos.length ? fotos.map(function(u) {
    return '<a href="' + u + '" target="_blank"><img src="' + u + '" style="width:100%;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--gray-200)"></a>';
  }).join('') : '';

  document.getElementById('gtia-det-overlay').style.display = 'block';
  document.getElementById('gtia-det-modal').style.display = 'block';
}
function gtiaDetCerrar() {
  document.getElementById('gtia-det-overlay').style.display = 'none';
  document.getElementById('gtia-det-modal').style.display = 'none';
}

async function gtiaDetGuardar() {
  var id = document.getElementById('gtia-det-id').value;
  var estado = document.getElementById('gtia-det-estado').value;
  var tecnico = document.getElementById('gtia-det-tecnico').value.trim();
  var fechaVis = document.getElementById('gtia-det-fecha-vis').value;
  var costoRep = parseFloat(document.getElementById('gtia-det-costo').value) || null;
  var notasInt = document.getElementById('gtia-det-notas').value.trim();
  var errEl = document.getElementById('gtia-det-error');

  var cambios = {
    estado: estado,
    tecnico_asignado: tecnico || null,
    fecha_visita_agendada: fechaVis || null,
    costo_reparacion: costoRep,
    notas_internas: notasInt || null
  };

  try {
    if (!sb()) throw new Error('Sin conexión');
    var res = await sb().from('garantias').update(cambios).eq('id', id);
    if (res.error) throw res.error;

    var idx = -1;
    for (var i = 0; i < GARANTIAS_CACHE.length; i++) { if (GARANTIAS_CACHE[i].id === id) { idx = i; break; } }
    var gActual = idx >= 0 ? GARANTIAS_CACHE[idx] : null;
    if (idx >= 0) {
      GARANTIAS_CACHE[idx] = Object.assign({}, GARANTIAS_CACHE[idx], cambios);
      localStorage.setItem('barrcan_garantias_cache', JSON.stringify(GARANTIAS_CACHE));
    }

    if (fechaVis && estado === 'visita_agendada' && gActual) {
      var msg = encodeURIComponent(
        '🛡️ *BarrCan · Visita de garantía agendada*\n' +
        'Hola ' + (gActual.cliente_nombre || '') + ', agendamos una visita para revisar tu reporte.\n' +
        '📅 Fecha: ' + fechaVis + '\n' +
        '👷 Técnico: ' + (tecnico || 'Por confirmar') + '\n' +
        '¿Tienes alguna pregunta? Escríbenos aquí.'
      );
      var telLimpio = (gActual.cliente_tel || '').replace(/\D/g, '');
      window.open('https://wa.me/52' + telLimpio + '?text=' + msg, '_blank');
    }

    toast('✅ Ticket actualizado · ' + estado);
    gtiaDetCerrar();
    garantiasRenderLista();
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    errEl.style.display = 'block';
  }
}

function gtiaDetWhatsApp() {
  var id = document.getElementById('gtia-det-id').value;
  var g = GARANTIAS_CACHE.filter(function(x) { return x.id === id; })[0];
  if (g) gtiaNotificarWhatsApp(g);
}

document.addEventListener('DOMContentLoaded', function() {
  detectarConexion();
  garantiasCargar();
  gtiaCargarTecnicosDinamico();
});
</script>
</body>
</html>
