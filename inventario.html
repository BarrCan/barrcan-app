<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BarrCan · Inventario</title>
<!--
  BARRCAN · MODULO: INVENTARIO (standalone)
  VERSION : v1.0
  FECHA   : 2026-07-05
  v1.0 - Control de inventario en bodega
    - Stock por tipo: Aluminio / Herrajes / Vidrio / Consumibles
    - Barras completas 6.10m + sobrantes individuales
    - Entradas manuales de material
    - Alertas de stock mínimo
    - Valor total del inventario
    - Busqueda rapida por clave/descripcion/color
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --navy:#1B3A5C;--blue:#2E6DA4;--gold:#C8923A;--green:#27AE60;
  --red:#C0392B;--gray-200:#E8ECF0;--gray-400:#9CA3AF;--gray-600:#6B7280;
  --white:#FFFFFF;--off-white:#F8F9FA;--radius:12px;--radius-sm:8px;
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--off-white);color:var(--navy);min-height:100vh}
.header{background:linear-gradient(135deg,var(--navy),#2A4F7A);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:36px;height:36px;border-radius:6px;overflow:hidden}
.logo-img img{width:100%;height:100%;object-fit:cover}
.logo-text{color:#fff;font-size:17px;font-weight:800}
.logo-sub{color:rgba(255,255,255,.6);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.badge{display:flex;align-items:center;gap:5px;background:rgba(200,146,58,.15);border:1px solid rgba(200,146,58,.3);border-radius:20px;padding:4px 10px;font-size:11px;color:#C8923A;font-weight:500}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#C8923A}
.content{padding:16px;max-width:800px;margin:0 auto}
.tabs{display:flex;gap:4px;background:var(--gray-200);border-radius:var(--radius-sm);padding:4px;margin-bottom:14px}
.tab-btn{flex:1;padding:8px 4px;border:none;background:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--gray-600);cursor:pointer}
.tab-btn.active{background:var(--white);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow-md)}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--navy);outline:none;margin-bottom:8px;background:var(--white)}
.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--navy);outline:none;margin-bottom:8px;background:var(--white)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:4px}
.btn{padding:10px 16px;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-primary{background:var(--navy);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:6px 12px;font-size:11px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--white);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--shadow-md)}
.stat-num{font-size:22px;font-weight:800;color:var(--navy)}
.stat-label{font-size:10px;color:var(--gray-400);margin-top:2px}
.stat-sub{font-size:11px;color:var(--gray-600);margin-top:4px}
.item-row{padding:10px 0;border-bottom:1px solid var(--gray-200)}
.item-row:last-child{border-bottom:none}
.item-header{display:flex;justify-content:space-between;align-items:flex-start}
.item-clave{font-size:12px;font-weight:700;font-family:monospace;color:var(--navy)}
.item-desc{font-size:11px;color:var(--gray-600);margin:2px 0}
.item-meta{font-size:10px;color:var(--gray-400)}
.cant-badge{font-size:16px;font-weight:800;text-align:right;min-width:55px}
.cant-ok{color:var(--green)}
.cant-low{color:var(--gold)}
.cant-out{color:var(--red)}
.tipo-chip{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;margin-right:4px}
.chip-alu{background:rgba(46,109,164,.1);color:var(--blue)}
.chip-her{background:rgba(200,146,58,.1);color:var(--gold)}
.chip-vid{background:rgba(39,174,96,.1);color:var(--green)}
.chip-con{background:rgba(107,114,128,.1);color:var(--gray-600)}
.alerta-item{background:rgba(192,57,43,.06);border-left:3px solid var(--red);padding:8px 12px;border-radius:0 8px 8px 0;margin-bottom:6px;font-size:12px}
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray-400)}
.search-wrap input{padding-left:30px;margin-bottom:0}
.section-title{font-size:20px;font-weight:800;margin-bottom:2px}
.section-sub{font-size:12px;color:var(--gray-400);margin-bottom:14px}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;align-items:flex-end}
.modal-box{width:100%;background:var(--white);border-radius:20px 20px 0 0;padding:20px;max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--gray-200);border-radius:2px;margin:0 auto 14px}
</style>
</head>

        Sobrantes y tramos
        <button class="btn btn-sm btn-primary" onclick="invCargarSobrantes()">↻ Actualizar</button>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="form-input" id="sob-busca" placeholder="Clave, longitud..." oninput="invFiltrarSobrantes()">
      </div>
      <div id="sob-lista"><div style="text-align:center;padding:20px;color:var(--gray-400)">Cargando...</div></div>
    </div>
  </div>

  <!-- TAB ALERTAS -->
  <div id="tab-alertas" style="display:none">
    <div class="card">
      <div class="card-title">Items con stock bajo o agotado</div>
      <div id="alerta-lista"><div style="text-align:center;padding:20px;color:var(--gray-400)">Cargando...</div></div>
    </div>
  </div>

  <!-- TAB ENTRADA -->
  <div id="tab-entrada" style="display:none">
    <div class="card">
      <div class="card-title">Registrar entrada de material</div>
      <label class="form-label">Tipo de material</label>
      <select class="form-select" id="ent-tipo" onchange="invTipoChange()">
        <option value="ALUMINIO">Aluminio (barras)</option>
        <option value="HERRAJES">Herrajes (piezas)</option>
        <option value="VIDRIO">Vidrio (m²)</option>
        <option value="CONSUMIBLE">Consumible</option>
      </select>
      <label class="form-label">Clave del material</label>
      <input type="text" class="form-input" id="ent-clave" placeholder="Ej: 0654, CV-08, GH-101">
      <label class="form-label">Descripción</label>
      <input type="text" class="form-input" id="ent-desc" placeholder="Descripción del material">
      <div class="form-row">
        <div>
          <label class="form-label">Color / Acabado</label>
          <select class="form-select" id="ent-color">
            <option value="NATURAL">Natural</option>
            <option value="BLANCO">Blanco</option>
            <option value="NEGRO">Negro</option>
            <option value="CHAMPAGNE">Champagne</option>
            <option value="GENERAL / SIN COLOR">Sin color</option>
          </select>
        </div>
        <div>
          <label class="form-label" id="ent-cant-label">Cantidad (barras)</label>
          <input type="number" class="form-input" id="ent-cant" value="1" min="0.01" step="0.01" inputmode="decimal">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">Proveedor</label>
          <input type="text" class="form-input" id="ent-prov" placeholder="Alucentro, ETC...">
        </div>
        <div>
          <label class="form-label">Factura</label>
          <input type="text" class="form-input" id="ent-fact" placeholder="V123456">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label class="form-label">Precio compra ($/unidad)</label>
          <input type="number" class="form-input" id="ent-precio" value="0" min="0" inputmode="decimal">
        </div>
        <div>
          <label class="form-label">Tipo de tramo</label>
          <select class="form-select" id="ent-tramo">
            <option value="Barra 6.10">Barra 6.10m completa</option>
            <option value="Tramo &lt; 6.10">Sobrante / Tramo</option>
            <option value="-">No aplica (pieza)</option>
          </select>
        </div>
      </div>
      <button class="btn btn-green" style="width:100%;margin-top:4px" onclick="invGuardarEntrada()">Registrar entrada</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE ITEM -->
<div id="modal-detalle" class="modal-ov">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px" id="md-titulo"></div>
    <div style="font-size:12px;color:var(--gray-400);margin-bottom:14px" id="md-sub"></div>
    <div id="md-cuerpo"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-primary" style="flex:1" onclick="invAbrirAjuste()">Ajustar cantidad</button>
      <button class="btn" style="border:1.5px solid var(--gray-200);color:var(--gray-600)" onclick="document.getElementById('modal-detalle').style.display='none'">Cerrar</button>
    </div>
  </div>
</div>
<script>
// BarrCan Inventario v1.0 — var/function, sin const/let globales
var SB_URL = 'https://rmngjtzupukhylxlgcww.supabase.co';
var SB_KEY = 'sb_publishable_udZ-NNvSLrSaDk2dBRPwMg_IQCZ4N2I';
var _sb = null;
function sb() {
  if (!_sb && window.supabase)
    _sb = window.supabase.createClient(SB_URL, SB_KEY, {
      db: { schema: 'barrcan' },
      auth: { persistSession: true, storageKey: 'barrcan_auth' }
    });
  return _sb;
}

var SYNC = { online: true };
window.addEventListener('online',  function() { SYNC.online = true;  detectar(); });
window.addEventListener('offline', function() { SYNC.online = false; detectar(); });
function detectar() {
  var dot = document.getElementById('conn-dot');
  var txt = document.getElementById('conn-status');
  if (dot) dot.style.background = SYNC.online ? '#27AE60' : '#C8923A';
  if (txt) txt.textContent      = SYNC.online ? 'Online'  : 'Offline';
}

function fmt(n) { return '$' + Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtN(n) { return Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg) {
  var el = document.getElementById('_toast');
  if (!el) { el = document.createElement('div'); el.id='_toast'; el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1B3A5C;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center'; document.body.appendChild(el); }
  el.textContent = msg; el.style.opacity = '1';
  clearTimeout(el._t); el._t = setTimeout(function(){ el.style.opacity = '0'; }, 2800);
}

// ── Estado ────────────────────────────────────────────────────
var INV_CACHE = [];
var SOB_CACHE = [];
var INV_ID_DETALLE = null;
var STOCK_MINIMO = { 'ALUMINIO': 2, 'HERRAJES': 3, 'VIDRIO': 1, 'CONSUMIBLE': 1 };

// ── Tabs ──────────────────────────────────────────────────────
function invTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var tabs = ['stock','sobrantes','alertas','entrada'];
  tabs.forEach(function(t) {
    var el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'sobrantes') invCargarSobrantes();
  if (tab === 'alertas')   invMostrarAlertas();
}

function tipoChip(tipo) {
  var t = (tipo||'').toUpperCase();
  if (t === 'ALUMINIO')   return '<span class="tipo-chip chip-alu">ALU</span>';
  if (t === 'HERRAJES')   return '<span class="tipo-chip chip-her">HER</span>';
  if (t === 'VIDRIO')     return '<span class="tipo-chip chip-vid">VID</span>';
  return '<span class="tipo-chip chip-con">CON</span>';
}

function cantClass(cant, tipo) {
  var min = STOCK_MINIMO[tipo] || 1;
  if (cant <= 0)    return 'cant-out';
  if (cant < min)   return 'cant-low';
  return 'cant-ok';
}

// ── STOCK ─────────────────────────────────────────────────────
async function invCargar() {
  var lista = document.getElementById('inv-lista');
  lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">Cargando...</div>';
  if (!sb()) return;
  try {
    var res = await sb().from('inventario_materiales')
      .select('id,clave_base,clave_cuprum,descripcion,color,tipo,cantidad,tipo_tramo,estado,precio_compra,precio_inventario,proveedor,fecha_compra')
      .eq('estado', 'Disponible')
      .order('tipo').order('descripcion')
      .limit(500);
    if (res.error) throw res.error;
    SYNC.online = true; detectar();
    INV_CACHE = res.data || [];

    // Stats
    var barras = INV_CACHE.filter(function(m) { return m.tipo === 'ALUMINIO'; }).length;
    var valor  = INV_CACHE.reduce(function(a, m) { return a + (parseFloat(m.precio_inventario||0) * parseFloat(m.cantidad||1)); }, 0);
    var alertas = INV_CACHE.filter(function(m) { return parseFloat(m.cantidad||0) < (STOCK_MINIMO[m.tipo]||1); }).length;
    document.getElementById('st-total').textContent   = INV_CACHE.length;
    document.getElementById('st-barras').textContent  = barras + ' barras aluminio';
    document.getElementById('st-valor').textContent   = valor > 0 ? fmt(valor) : 'Sin precios aún';
    document.getElementById('st-alertas').textContent = alertas > 0 ? '⚠ ' + alertas + ' bajo stock mínimo' : '';

    invFiltrar();
  } catch(e) {
    SYNC.online = false; detectar();
    lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--red)">Error: ' + esc(e.message) + '</div>';
  }
}

function invFiltrar() {
  var busca = (document.getElementById('inv-busca').value || '').toLowerCase();
  var tipo  = document.getElementById('inv-tipo').value;
  var lista = document.getElementById('inv-lista');

  var filtrado = INV_CACHE.filter(function(m) {
    if (m.tipo_tramo && m.tipo_tramo.indexOf('Tramo') >= 0) return false; // sobrantes van en otro tab
    var matchB = !busca ||
      (m.clave_base||'').toLowerCase().indexOf(busca) >= 0 ||
      (m.descripcion||'').toLowerCase().indexOf(busca) >= 0 ||
      (m.color||'').toLowerCase().indexOf(busca) >= 0;
    var matchT = !tipo || m.tipo === tipo;
    return matchB && matchT;
  });

  if (!filtrado.length) {
    lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">Sin resultados</div>';
    return;
  }

  var html = '';
  filtrado.forEach(function(m) {
    var cant = parseFloat(m.cantidad || 0);
    var cc   = cantClass(cant, m.tipo);
    var unid = m.tipo === 'ALUMINIO' ? 'barras' : m.tipo === 'VIDRIO' ? 'm²' : 'pza';
    html += '<div class="item-row" onclick="invVerDetalle(\'' + m.id + '\')" style="cursor:pointer">'
      + '<div class="item-header">'
      + '<div style="flex:1">'
      + '<div class="item-clave">' + tipoChip(m.tipo) + esc(m.clave_base||'—') + '</div>'
      + '<div class="item-desc">' + esc((m.descripcion||'').slice(0,55)) + '</div>'
      + '<div class="item-meta">' + esc(m.color||'') + ' · ' + esc(m.proveedor||'') + '</div>'
      + (m.precio_inventario ? '<div class="item-meta">Precio inv: ' + fmt(m.precio_inventario) + '</div>' : '')
      + '</div>'
      + '<div style="text-align:right">'
      + '<div class="cant-badge ' + cc + '">' + fmtN(cant) + '</div>'
      + '<div style="font-size:10px;color:var(--gray-400)">' + unid + '</div>'
      + '</div>'
      + '</div>'
      + '</div>';
  });
  lista.innerHTML = html;
}

// ── SOBRANTES ─────────────────────────────────────────────────
async function invCargarSobrantes() {
  var lista = document.getElementById('sob-lista');
  lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">Cargando...</div>';
  if (!sb()) return;
  try {
    var res = await sb().from('inventario_materiales')
      .select('id,clave_base,descripcion,color,cantidad,tipo_tramo,proveedor,fecha_compra,estado')
      .eq('tipo', 'ALUMINIO')
      .ilike('tipo_tramo', 'Tramo%')
      .order('clave_base')
      .limit(200);
    if (res.error) throw res.error;
    SOB_CACHE = res.data || [];
    invFiltrarSobrantes();
  } catch(e) {
    lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--red)">Error al cargar</div>';
  }
}

function invFiltrarSobrantes() {
  var busca = (document.getElementById('sob-busca').value || '').toLowerCase();
  var lista = document.getElementById('sob-lista');
  var filtrado = SOB_CACHE.filter(function(m) {
    return !busca ||
      (m.clave_base||'').toLowerCase().indexOf(busca) >= 0 ||
      (m.tipo_tramo||'').toLowerCase().indexOf(busca) >= 0 ||
      (m.descripcion||'').toLowerCase().indexOf(busca) >= 0;
  });

  if (!filtrado.length) {
    lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">Sin sobrantes registrados</div>';
    return;
  }

  var html = '';
  filtrado.forEach(function(m) {
    var usado = m.estado === 'Usado';
    html += '<div class="item-row" style="' + (usado ? 'opacity:.5' : '') + '">'
      + '<div class="item-header">'
      + '<div style="flex:1">'
      + '<div class="item-clave">' + esc(m.clave_base||'—') + '</div>'
      + '<div class="item-desc">' + esc((m.descripcion||'').slice(0,45)) + '</div>'
      + '<div class="item-meta">' + esc(m.color||'') + ' · ' + esc(m.tipo_tramo||'') + '</div>'
      + '</div>'
      + '<div style="text-align:right">'
      + '<div style="font-size:11px;font-weight:700;color:' + (usado ? 'var(--gray-400)' : 'var(--green)') + '">'
      + (usado ? 'Usado' : 'Disponible') + '</div>'
      + '<div style="font-size:10px;color:var(--gray-400)">' + (m.fecha_compra||'') + '</div>'
      + '</div>'
      + '</div>'
      + '</div>';
  });
  lista.innerHTML = html;
}

// ── ALERTAS ───────────────────────────────────────────────────
function invMostrarAlertas() {
  var lista = document.getElementById('alerta-lista');
  if (!INV_CACHE.length) {
    lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400)">Carga el inventario primero</div>';
    return;
  }
  var bajos = INV_CACHE.filter(function(m) {
    return parseFloat(m.cantidad||0) < (STOCK_MINIMO[m.tipo]||1);
  });
  if (!bajos.length) {
    lista.innerHTML = '<div style="text-align:center;padding:20px;color:var(--green)">✅ Todo el stock está en niveles correctos</div>';
    return;
  }
  var html = '';
  bajos.forEach(function(m) {
    var cant = parseFloat(m.cantidad||0);
    html += '<div class="alerta-item">'
      + '<strong>' + esc(m.clave_base||'—') + '</strong> · ' + esc((m.descripcion||'').slice(0,40))
      + '<br><span style="color:var(--red)">Stock: ' + fmtN(cant) + '</span>'
      + ' · Mínimo recomendado: ' + (STOCK_MINIMO[m.tipo]||1)
      + ' · <span style="color:var(--gray-400)">' + esc(m.proveedor||'') + '</span>'
      + '</div>';
  });
  lista.innerHTML = html;
}

// ── VER DETALLE ───────────────────────────────────────────────
function invVerDetalle(id) {
  INV_ID_DETALLE = id;
  var m = INV_CACHE.filter(function(x) { return x.id === id; })[0];
  if (!m) return;
  document.getElementById('md-titulo').textContent = m.clave_base + ' — ' + (m.descripcion||'').slice(0,40);
  document.getElementById('md-sub').textContent    = m.tipo + ' · ' + (m.color||'') + ' · ' + (m.proveedor||'');
  var cant = parseFloat(m.cantidad||0);
  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  html += '<div style="background:var(--off-white);padding:10px;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:800;color:var(--navy)">' + fmtN(cant) + '</div><div style="font-size:10px;color:var(--gray-400)">En stock</div></div>';
  html += '<div style="background:var(--off-white);padding:10px;border-radius:8px;text-align:center"><div style="font-size:16px;font-weight:800;color:var(--navy)">' + (m.precio_inventario ? fmt(m.precio_inventario) : '—') + '</div><div style="font-size:10px;color:var(--gray-400)">Precio inv.</div></div>';
  html += '</div>';
  html += '<div style="font-size:12px;color:var(--gray-600);line-height:1.8">';
  html += '<div><strong>Clave Cuprum:</strong> ' + esc(m.clave_cuprum||'N/A') + '</div>';
  html += '<div><strong>Tipo tramo:</strong> ' + esc(m.tipo_tramo||'—') + '</div>';
  html += '<div><strong>Precio compra:</strong> ' + (m.precio_compra ? fmt(m.precio_compra) : 'No registrado') + '</div>';
  html += '<div><strong>Última entrada:</strong> ' + (m.fecha_compra||'—') + '</div>';
  html += '</div>';
  document.getElementById('md-cuerpo').innerHTML = html;
  document.getElementById('modal-detalle').style.display = 'flex';
}

function invAbrirAjuste() {
  var nueva = prompt('Nueva cantidad en stock:');
  if (nueva === null || nueva === '') return;
  var n = parseFloat(nueva);
  if (isNaN(n) || n < 0) { toast('Cantidad inválida'); return; }
  invActualizarCantidad(INV_ID_DETALLE, n);
}

async function invActualizarCantidad(id, cantidad) {
  if (!sb()) return;
  try {
    var res = await sb().from('inventario_materiales').update({ cantidad: cantidad }).eq('id', id);
    if (res.error) throw res.error;
    // Actualizar cache
    for (var i = 0; i < INV_CACHE.length; i++) {
      if (INV_CACHE[i].id === id) { INV_CACHE[i].cantidad = cantidad; break; }
    }
    document.getElementById('modal-detalle').style.display = 'none';
    invFiltrar();
    toast('Cantidad actualizada');
  } catch(e) {
    toast('Error: ' + e.message);
  }
}

// ── ENTRADA DE MATERIAL ───────────────────────────────────────
function invTipoChange() {
  var tipo = document.getElementById('ent-tipo').value;
  var lbl  = document.getElementById('ent-cant-label');
  var tramo = document.getElementById('ent-tramo');
  if (tipo === 'ALUMINIO') {
    lbl.textContent = 'Cantidad (barras)';
    tramo.style.display = 'block';
  } else if (tipo === 'VIDRIO') {
    lbl.textContent = 'Cantidad (m²)';
    tramo.style.display = 'none';
    document.getElementById('ent-tramo').value = '-';
  } else {
    lbl.textContent = 'Cantidad (pzas)';
    tramo.style.display = 'none';
    document.getElementById('ent-tramo').value = '-';
  }
}

async function invGuardarEntrada() {
  var tipo   = document.getElementById('ent-tipo').value;
  var clave  = document.getElementById('ent-clave').value.trim();
  var desc   = document.getElementById('ent-desc').value.trim();
  var color  = document.getElementById('ent-color').value;
  var cant   = parseFloat(document.getElementById('ent-cant').value) || 0;
  var prov   = document.getElementById('ent-prov').value.trim();
  var fact   = document.getElementById('ent-fact').value.trim();
  var precio = parseFloat(document.getElementById('ent-precio').value) || 0;
  var tramo  = document.getElementById('ent-tramo').value;

  if (!clave) { toast('Ingresa la clave del material'); return; }
  if (!desc)  { toast('Ingresa la descripción'); return; }
  if (cant <= 0) { toast('Cantidad debe ser mayor a 0'); return; }

  var margen     = tipo === 'ALUMINIO' ? 0.02 : 0.03;
  var precioInv  = precio > 0 ? precio * (1 + margen) : 0;
  var hoy        = new Date().toISOString().split('T')[0];

  var payload = {
    fecha_compra:     hoy,
    proveedor:        prov || 'Manual',
    factura:          fact || 'ENTRADA-MANUAL',
    clave_base:       clave,
    clave_cuprum:     'N/A',
    descripcion:      desc,
    color:            color,
    tipo:             tipo,
    cantidad:         cant,
    tipo_tramo:       tramo,
    estado:           'Disponible',
    precio_compra:    precio || null,
    precio_inventario: precioInv || null,
    margen_aplicado:  precio > 0 ? margen * 100 : null,
    origen:           'entrada_manual'
  };

  if (!sb()) { toast('Sin conexión — no se puede guardar'); return; }
  try {
    var res = await sb().from('inventario_materiales').insert([payload]);
    if (res.error) throw res.error;
    toast('Entrada registrada: ' + cant + ' ' + tipo);
    // Limpiar form
    document.getElementById('ent-clave').value  = '';
    document.getElementById('ent-desc').value   = '';
    document.getElementById('ent-prov').value   = '';
    document.getElementById('ent-fact').value   = '';
    document.getElementById('ent-precio').value = '0';
    document.getElementById('ent-cant').value   = '1';
    // Recargar stock
    invCargar();
    // Ir al tab stock
    invTab(document.querySelector('.tab-btn'), 'stock');
  } catch(e) {
    toast('Error: ' + e.message);
  }
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  detectar();
  invCargar();
});
</script>
</body>
</html>
