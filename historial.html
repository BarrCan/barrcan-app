<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BarrCan · Historial</title>

  BARRCAN · MÓDULO: HISTORIAL (standalone)

    - FIX: detectarConexion() con mismo patrón que barrcan_app.html

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --navy: #1B3A5C;
  --blue: #2E6DA4;
  --gold: #C8923A;
  --gold-light: #E8B96A;
  --orange: #FF6600;
  --white: #FFFFFF;
  --off-white: #F7F5F0;
  --gray-100: #F0EDE8;
  --gray-200: #DDD9D2;
  --gray-400: #9A9590;
  --gray-600: #5A5652;
  --green: #2D7D46;
  --red: #C0392B;
  --amber: #E67E22;
  --shadow-sm: 0 2px 8px rgba(27,58,92,0.08);
  --shadow-md: 0 8px 32px rgba(27,58,92,0.14);
  --shadow-lg: 0 20px 60px rgba(27,58,92,0.20);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--off-white);
  color: var(--navy);
  overscroll-behavior: none;
}

/* ─── LAYOUT ─── */
#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ─── HEADER ─── */
.header {
  background: var(--navy);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  position: relative;
  z-index: 100;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 16px;
  color: var(--navy);
  letter-spacing: -0.5px;
}
.logo-text {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--white);
  letter-spacing: 0.5px;
}
.logo-sub {
  font-size: 9px;
  color: var(--gold-light);
  letter-spacing: 2px;
  text-transform: uppercase;
  display: block;
  margin-top: -3px;
}
.offline-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(200,146,58,0.15);
  border: 1px solid rgba(200,146,58,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--gold-light);
  font-weight: 500;
}
.offline-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold-light);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ─── TABS ─── */
.tabs {
  background: var(--navy);
  display: flex;
  border-bottom: 2px solid rgba(200,146,58,0.3);
  flex-shrink: 0;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  scroll-behavior: smooth;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  min-width: 68px;
  padding: 10px 10px;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
}
.tab-icon { font-size: 16px; }
.tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
.tab:active { background: rgba(255,255,255,0.05); }

/* ─── CONTENT ─── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ─── SCREEN ─── */
.screen { display: none; padding: 16px; }
.screen.active { display: block; }

/* ─── CATÁLOGO AGRUPADO ─── */
.familia-grupo {
  margin-bottom: 10px;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.familia-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  background: var(--navy);
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
  gap: 10px;
}
.familia-header:active { background: #0f2a45; }
.familia-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.familia-emoji { font-size: 20px; flex-shrink: 0; }
.familia-nombre {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}
.familia-desc {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  margin-top: 1px;
}
.familia-badge {
  background: rgba(200,146,58,0.25);
  color: var(--gold-light);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
.familia-chevron {
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  transition: transform 0.25s;
  flex-shrink: 0;
}
.familia-grupo.open .familia-chevron { transform: rotate(180deg); }
.familia-body {
  display: none;
  background: var(--white);
  padding: 12px;
}
.familia-grupo.open .familia-body { display: block; }
.catalogo-seccion-header {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  padding: 18px 4px 6px;
  margin-top: 4px;
  border-bottom: 1px solid var(--gray-200);
  margin-bottom: 8px;
}
.catalogo-seccion-header:first-child { padding-top: 4px; margin-top: 0; }
.familia-vacia .familia-header { opacity: 0.55; cursor: default; }
.familia-vacia .familia-badge { background: rgba(90,86,82,0.15); color: var(--gray-400); }
.familia-vacia-label {
  padding: 14px 16px;
  font-size: 12px;
  color: var(--gray-400);
  background: var(--white);
  text-align: center;
  font-style: italic;
}
.orden-filtro-btn {
  padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray-200);
  background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  color:var(--gray-400);cursor:pointer;white-space:nowrap;transition:all 0.15s;
}
.orden-filtro-btn.active {
  background:var(--navy);color:#fff;border-color:var(--navy);
}
.orden-card {
  background:var(--white);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer;
  border-left:5px solid var(--gray-200);transition:all 0.15s;
}
.orden-card.pendiente  { border-left-color:#F39C12; }
.orden-card.en_camino  { border-left-color:#2980B9; }
.orden-card.completada { border-left-color:#27AE60; }
.orden-card.cancelada  { border-left-color:#E74C3C; opacity:0.6; }
.orden-estado-badge {
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;
  letter-spacing:0.5px;text-transform:uppercase;
}
.badge-pendiente  { background:rgba(243,156,18,0.12);  color:#E67E22; }
.badge-en_camino  { background:rgba(41,128,185,0.12);  color:#2980B9; }
.badge-completada { background:rgba(39,174,96,0.12);   color:#27AE60; }
.badge-cancelada  { background:rgba(231,76,60,0.12);   color:#E74C3C; }
  background: rgba(46,109,164,0.12);
  color: var(--blue);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 8px;
  margin-left: 6px;
}

/* ─── CATALOG GRID ─── */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.section-sub {
  font-size: 12px;
  color: var(--gray-400);
  margin-bottom: 16px;
  letter-spacing: 0.3px;
}

.catalog-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.catalog-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.catalog-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--blue);
  opacity: 0;
  transition: opacity 0.2s;
}
.catalog-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,146,58,0.15);
}
.catalog-card.selected::before { opacity: 1; background: var(--gold); }
.catalog-card:active { transform: scale(0.97); }

.card-svg {
  width: 100%;
  height: 80px;
  margin-bottom: 10px;
}
.card-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.3;
  margin-bottom: 3px;
}
.card-series {
  font-size: 10px;
  color: var(--blue);
  font-weight: 500;
  background: rgba(46,109,164,0.08);
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 4px;
}
.card-badge {
  font-size: 9px;
  color: var(--gray-400);
  font-family: 'DM Mono', monospace;
}

/* ─── FORM ─── */
.wizard-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.wizard-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wizard-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gray-200);
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 5px;
  letter-spacing: 0.3px;
}
.form-input, .form-select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--navy);
  background: var(--off-white);
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(46,109,164,0.12);
  background: var(--white);
}
.form-input.mm-input { font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 1px; }
.input-unit {
  position: relative;
}
.input-unit .form-input { padding-right: 48px; }
.input-unit-label {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-400);
  letter-spacing: 0.5px;
  pointer-events: none;
}

.form-select-wrap { position: relative; }
.form-select-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--blue);
  pointer-events: none;
  font-size: 14px;
}
select.form-select { padding-right: 36px; cursor: pointer; }

/* Switch */
.switch-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
}
.switch-info {}
.switch-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--navy);
}
.switch-desc {
  font-size: 11px;
  color: var(--gray-400);
  margin-top: 2px;
}
.toggle {
  width: 46px;
  height: 26px;
  background: var(--gray-200);
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--blue); }
.toggle-knob {
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 3px;
  left: 3px;
  transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle.on .toggle-knob { transform: translateX(20px); }

/* Piso selector */
.piso-selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.piso-btn {
  flex: 1;
  min-width: 36px;
  padding: 8px 4px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: var(--off-white);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-600);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.piso-btn.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--white);
}
.piso-btn:active { transform: scale(0.92); }

/* Modalidad */
.modalidad-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modalidad-btn {
  padding: 12px 10px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: var(--off-white);
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.modalidad-btn.active {
  border-color: var(--gold);
  background: rgba(200,146,58,0.06);
}
.modalidad-icon { font-size: 20px; margin-bottom: 4px; }
.modalidad-label { font-size: 11px; font-weight: 600; color: var(--navy); }
.modalidad-desc { font-size: 10px; color: var(--gray-400); }

/* ─── CALCULAR BTN ─── */
.btn-calcular {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--orange), #FF8533);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(255,102,0,0.35);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-calcular:active { transform: scale(0.97); box-shadow: 0 3px 10px rgba(255,102,0,0.25); }
.btn-calcular:disabled { background: var(--gray-200); box-shadow: none; color: var(--gray-400); }

/* ─── ALERTA DE PESO ─── */
.peso-alert {
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.peso-alert.verde { background: rgba(45,125,70,0.08); border: 1.5px solid rgba(45,125,70,0.25); }
.peso-alert.ambar { background: rgba(230,126,34,0.08); border: 1.5px solid rgba(230,126,34,0.30); }
.peso-alert.rojo { background: rgba(192,57,43,0.08); border: 1.5px solid rgba(192,57,43,0.35); }
.alert-icon { font-size: 24px; flex-shrink: 0; margin-top: 1px; }
.alert-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.peso-alert.verde .alert-title { color: var(--green); }
.peso-alert.ambar .alert-title { color: var(--amber); }
.peso-alert.rojo .alert-title { color: var(--red); }
.alert-body { font-size: 11px; color: var(--gray-600); line-height: 1.5; }

/* ─── RESULTADO / PRESUPUESTO ─── */
.resultado-header {
  background: linear-gradient(135deg, var(--navy), #2A4F7A);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  color: white;
  position: relative;
  overflow: hidden;
}
.resultado-header::after {
  content: 'BC';
  position: absolute;
  right: -8px;
  bottom: -20px;
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  font-weight: 900;
  color: rgba(255,255,255,0.04);
  pointer-events: none;
}
.res-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
.res-diseno { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
.res-medidas {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--gold-light);
  letter-spacing: 1px;
}
.res-precio-final {
  text-align: right;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.15);
}
.res-precio-label { font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.res-precio-monto {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--gold-light);
}
.res-precio-mxn { font-size: 14px; font-weight: 400; margin-left: 4px; opacity: 0.7; }

/* Vista toggle */
.vista-toggle {
  display: flex;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 12px;
}
.vista-btn {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-400);
  cursor: pointer;
  transition: all 0.2s;
}
.vista-btn.active {
  background: var(--white);
  color: var(--navy);
  box-shadow: var(--shadow-sm);
}

/* Desglose */
.desglose-card {
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.desglose-header {
  padding: 12px 16px;
  background: var(--navy);
  color: white;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.desglose-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--gray-100);
  gap: 10px;
}
.desglose-row:last-child { border-bottom: none; }
.desglose-clave {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--blue);
  background: rgba(46,109,164,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.desglose-desc {
  flex: 1;
  font-size: 12px;
  color: var(--navy);
  line-height: 1.3;
}
.desglose-val {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  text-align: right;
  white-space: nowrap;
}
.desglose-val.gold { color: var(--gold); }

/* Costos table */
.costo-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 16px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 13px;
}
.costo-row:last-child { border-bottom: none; }
.costo-row.subtotal { background: var(--gray-100); font-weight: 600; }
.costo-row.total {
  background: var(--navy);
  color: white;
  font-weight: 700;
  font-size: 15px;
  padding: 14px 16px;
}
.costo-row.total .costo-monto { color: var(--gold-light); font-family: 'DM Mono', monospace; }
.costo-monto { font-family: 'DM Mono', monospace; font-weight: 600; }
.costo-pct { font-size: 10px; color: var(--gray-400); margin-left: 6px; }

/* ─── HISTORIAL ─── */
.historial-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-400);
}
.historial-empty-icon { font-size: 48px; margin-bottom: 12px; }
.historial-item {
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.historial-item:active { transform: scale(0.98); }
.hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.hist-diseno { font-size: 14px; font-weight: 700; color: var(--navy); }
.hist-precio { font-size: 16px; font-weight: 700; color: var(--gold); font-family: 'DM Mono', monospace; }
.hist-bottom { display: flex; gap: 8px; flex-wrap: wrap; }
.hist-tag {
  font-size: 10px;
  background: var(--gray-100);
  color: var(--gray-600);
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
}
.hist-date { font-size: 10px; color: var(--gray-400); margin-top: 4px; }

/* ─── CONFIG ─── */
.config-section { margin-bottom: 20px; }
.config-item {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.config-item-label { font-size: 13px; font-weight: 600; color: var(--navy); }
.config-item-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--blue);
  font-weight: 600;
}
.config-input-inline {
  width: 80px;
  padding: 6px 10px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  text-align: right;
  background: var(--off-white);
}
.config-input-inline:focus { outline: none; border-color: var(--blue); }

.btn-limpiar {
  width: 100%;
  padding: 14px;
  background: rgba(192,57,43,0.08);
  border: 1.5px solid rgba(192,57,43,0.25);
  border-radius: var(--radius);
  color: var(--red);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-limpiar:active { background: rgba(192,57,43,0.15); }

/* ─── NO RESULTS ─── */
.no-selection {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-400);
}
.no-sel-icon { font-size: 40px; margin-bottom: 12px; }
.no-sel-text { font-size: 14px; }

/* ─── FOOTER EXPORT BTN ─── */
.export-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
  display: none;
  gap: 10px;
  z-index: 200;
}
.export-bar.visible { display: flex; }
.btn-export {
  flex: 1;
  padding: 14px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-export:active { transform: scale(0.97); }
.btn-save {
  width: 52px;
  height: 52px;
  background: var(--gold);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-save:active { transform: scale(0.95); }

/* ─── SELECCIÓN MÚLTIPLE ─── */
.historial-item { transition: all 0.15s; }
.hist-selected {
  border: 2px solid var(--blue) !important;
  background: rgba(46,109,164,0.04) !important;
}
.hist-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--gray-200);
  background: var(--off-white);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  transition: all 0.15s;
  margin-top: 2px;
}
.hist-check.checked {
  background: var(--blue);
  border-color: var(--blue);
}

/* Barra flotante de selección */
.barra-seleccion {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--navy);
  padding: 12px 16px;
  display: none;
  align-items: center;
  gap: 12px;
  z-index: 300;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
  border-top: 2px solid var(--gold);
}
.barra-seleccion.visible { display: flex; }
.sel-info { flex: 1; }
.sel-count { font-size: 11px; color: rgba(255,255,255,0.6); }
.sel-total { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 700; color: var(--gold-light); }
.btn-generar-global {
  padding: 12px 18px;
  background: linear-gradient(135deg, var(--orange), #FF8533);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 12px rgba(255,102,0,0.4);
  transition: all 0.2s;
}
.btn-generar-global:active { transform: scale(0.96); }

/* ─── PRINT / PDF ─── */
@media print {
  /* Ocultar toda la app */
  #app, .header, .tabs, .export-bar, .toast,
  .barra-seleccion, #modal-overlay, #modal-edicion,
  #modal-contrato-overlay, #modal-contrato,
  #entrega-overlay { display: none !important; }
  /* Mostrar solo el área de impresión activa */
  #print-area, #ent-print-area {
    display: block !important;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: white;
  }
  body { margin: 0; padding: 0; background: white; }
  @page { margin: 12mm 14mm; size: letter; }
}

/* ─── MÓDULO ENTREGA ─── */
.ent-check-item {
  display:flex;align-items:flex-start;gap:10px;
  background:var(--off-white);border-radius:var(--radius-sm);
  padding:10px 12px;border:1.5px solid var(--gray-100);transition:border-color 0.15s;
}
.ent-check-item.ok { border-color:rgba(45,125,70,0.3);background:rgba(45,125,70,0.04); }
.ent-check-item.fail { border-color:rgba(192,57,43,0.3);background:rgba(192,57,43,0.04); }
.ent-check-toggle { display:flex;gap:5px;flex-shrink:0;margin-top:2px; }
.ent-check-btn {
  width:28px;height:28px;border-radius:50%;border:1.5px solid var(--gray-200);
  background:white;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.ent-check-btn.sel-ok { background:var(--green);border-color:var(--green); }
.ent-check-btn.sel-fail { background:var(--red);border-color:var(--red); }
.ent-check-desc { flex:1;font-size:12px;color:var(--navy);line-height:1.4; }
.ent-check-nota { width:100%;margin-top:6px;padding:6px 8px;border:1px solid var(--gray-200);border-radius:4px;font-size:11px;font-family:'DM Sans',sans-serif; }
.ent-evidencia-item {
  border:2px dashed var(--gray-200);border-radius:var(--radius-sm);
  padding:12px;cursor:pointer;transition:all 0.2s;
  background:var(--off-white);position:relative;
}
.ent-evidencia-item.completo { border-color:rgba(45,125,70,0.4);background:rgba(45,125,70,0.04); }
.ent-ev-row { display:flex;align-items:center;gap:10px; }
.ent-ev-ico { font-size:22px;flex-shrink:0; }
.ent-ev-titulo { font-size:12px;font-weight:700;color:var(--navy); }
.ent-ev-sub { font-size:10px;color:var(--gray-400);margin-top:1px; }
.ent-ev-preview { width:100%;max-height:140px;object-fit:cover;border-radius:6px;margin-top:8px;display:none; }
.ent-ev-done { position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--green);border-radius:50%;display:none;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700; }
.ent-evidencia-item.completo .ent-ev-done { display:flex; }

/* Encuesta */
.encuesta-overlay {
  position:fixed;inset:0;
  background:linear-gradient(160deg,#0F2A45,#1B3A5C);
  z-index:9100;overflow-y:auto;padding:24px 20px 60px;display:none;
}
.encuesta-overlay.visible { display:block; }
.enc-card { background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px; }
.enc-pregunta { font-size:14px;font-weight:600;color:white;margin-bottom:10px;line-height:1.4; }
.enc-opciones { display:flex;flex-direction:column;gap:7px; }
.enc-opcion {
  padding:10px 14px;border-radius:var(--radius-sm);
  border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);
  color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;text-align:left;
  transition:all 0.15s;font-family:'DM Sans',sans-serif;width:100%;
}
.enc-opcion.sel { background:rgba(200,146,58,0.25);border-color:var(--gold);color:white;font-weight:600; }
.enc-opcion:active { transform:scale(0.98); }
.enc-textarea {
  width:100%;padding:10px;border-radius:var(--radius-sm);
  border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);
  color:white;font-family:'DM Sans',sans-serif;font-size:13px;resize:none;box-sizing:border-box;
}
.enc-textarea::placeholder { color:rgba(255,255,255,0.3); }

/* Animations */
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.slide-up { animation: slideUp 0.35s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.shake { animation: shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--navy);
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Vidrio SVG preview */
.vidrio-preview {
  background: var(--gray-100);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  text-align: center;
}

<script>

// ── Supabase ─────────────────────────────────────────────────────
var SB_URL = 'https://rmngjtzupukhylxlgcww.supabase.co';
var SB_KEY = 'sb_publishable_udZ-NNvSLrSaDk2dBRPwMg_IQCZ4N2I';
var _sbClient = null;
function sb() {
  if (!_sbClient && window.supabase) {
    _sbClient = window.supabase.createClient(SB_URL, SB_KEY, {
      db: { schema: 'barrcan' },
      auth: { persistSession: true, storageKey: 'barrcan_auth' }
    });
  }
  return _sbClient;
}

// ── Conexión — patrón exacto de barrcan_app.html ─────────────────
// SYNC.online usa navigator.onLine como punto de partida
// Los eventos online/offline lo mantienen actualizado
var SYNC = { online: navigator.onLine };

window.addEventListener('online',  function() {
  SYNC.online = true;
  detectarConexion();
  presCargar();
  var cola = JSON.parse(localStorage.getItem('barrcan_presupuestos_pendientes') || '[]');
  if (cola.length) presReintentarPendientes();
});
window.addEventListener('offline', function() {
  SYNC.online = false;
  detectarConexion();
});

// detectarConexion: igual que en la app principal
// registra listeners Y actualiza el badge inmediatamente
function detectarConexion() {
  var badge = document.getElementById('conn-status');
  if (badge) badge.textContent = navigator.onLine ? 'Online' : 'Offline-First';
}

// ── Helpers ───────────────────────────────────────────────────────
function fmt(n) {
  return Number(n || 0).toLocaleString('es-MX', {
    minimumFractionDigits: 0, maximumFractionDigits: 2
  });
}

function toast(msg, dur) {
  dur = dur || 2800;
  var el = document.getElementById('_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_toast';
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);'
      + 'background:#1B3A5C;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;'
      + 'z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;'
      + 'max-width:90vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3)';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.style.opacity = '0'; }, dur);
}

// ── Estado ────────────────────────────────────────────────────────
var PRES_CACHE = [];
var PRES_EDITANDO_ID = null;

var ESTADO_LABELS = {
  activo: 'Activo',
  aprobado: 'Aprobado',
  en_produccion: 'En producci\u00f3n',
  pendiente_entrega: 'Pend. entrega',
  entregado: 'Entregado'
};
var ESTADO_COLORS = {
  activo: 'var(--blue)',
  aprobado: 'var(--green)',
  en_produccion: 'var(--gold)',
  pendiente_entrega: '#E67E22',
  entregado: 'var(--gray-400)'
};

// ── Cache local ───────────────────────────────────────────────────
function presGuardarCache(lista) {
  try {
    localStorage.setItem('barrcan_presupuestos_cache', JSON.stringify(lista));
  } catch(e) {}
}
function presCargarCache() {
  try {
    var raw = localStorage.getItem('barrcan_presupuestos_cache');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

// ── Cargar desde Supabase ─────────────────────────────────────────
// Mismo patrón que entVerHistorialReportes() de la app principal:
// 1. Mostrar caché local de inmediato
// 2. Si hay conexión, pedir a Supabase y actualizar
async function presCargar() {
  var div = document.getElementById('pres-lista');
  var local = presCargarCache();

  // Mostrar caché inmediatamente (nunca bloquear UI)
  if (local.length) {
    PRES_CACHE = local;
    presFiltrar();
  } else {
    div.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px">Sin presupuestos registrados</div>';
  }

  // Intentar Supabase (la conexión real se detecta al hacer el fetch)
  if (!sb()) return; // CDN no cargó aún — el DOMContentLoaded reintentará

  try {
    var result = await sb().from('presupuestos_atrasados')
      .select('id,folio,cliente,tel,dir,monto,saldo,descripcion,fecha,estado,created_at')
      .order('created_at', { ascending: false })
      .range(0, 499);

    if (result.error) throw result.error;

    // Supabase respondió = hay conexión real
    SYNC.online = true;
    detectarConexion();

    var pendientes = presCargarCache().filter(function(p) { return p._pendiente; });
    PRES_CACHE = pendientes.concat(result.data || []);
    presGuardarCache(PRES_CACHE);
    presFiltrar();

  } catch(e) {
    var esRed = /failed to fetch|network|fetch/i.test(e.message || '');
    if (esRed) {
      SYNC.online = false;
      detectarConexion();
    }
    console.warn('presCargar:', e.message);
    if (!local.length) {
      div.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px">'
        + (esRed ? '\ud83d\udcf5 Sin conexi\u00f3n' : '\u26a0 Error al cargar') + '<br>'
        + '<button onclick="presCargar()" style="margin-top:8px;padding:6px 14px;'
        + 'background:var(--navy);color:#fff;border:none;border-radius:8px;'
        + 'font-size:12px;font-weight:700;cursor:pointer">'
        + 'Reintentar</button></div>';
    }
  }
}

// ── Render lista ──────────────────────────────────────────────────
function presFiltrar() {
  var q = (document.getElementById('pres-buscar').value || '').toLowerCase().trim();
  var datos = q ? PRES_CACHE.filter(function(p) {
    return (p.folio || '').toLowerCase().indexOf(q) >= 0
      || (p.cliente || '').toLowerCase().indexOf(q) >= 0;
  }) : PRES_CACHE;
  presRenderLista(datos);
  presActualizarContador();
}

function presActualizarContador() {
  var pendientes = JSON.parse(localStorage.getItem('barrcan_presupuestos_pendientes') || '[]');
  var el = document.getElementById('pres-contador');
  var txt = PRES_CACHE.length
    ? PRES_CACHE.length + ' presupuesto' + (PRES_CACHE.length > 1 ? 's' : '')
    : '';
  if (pendientes.length) {
    txt += ' &middot; <span onclick="presReintentarPendientes()" '
      + 'style="color:var(--gold);font-weight:700;cursor:pointer;text-decoration:underline">'
      + pendientes.length + ' sin sincronizar</span>';
  }
  el.innerHTML = txt;
}

function presRenderLista(datos) {
  var div = document.getElementById('pres-lista');
  if (!datos.length) {
    div.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px">'
      + 'Sin presupuestos registrados</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < Math.min(datos.length, 50); i++) {
    var p = datos[i];
    var color = ESTADO_COLORS[p.estado] || 'var(--gray-400)';
    var bgPend = p._pendiente
      ? 'background:rgba(192,57,43,0.04);border-left:3px solid var(--red);padding-left:8px'
      : '';
    var sincTag = p._pendiente
      ? '<div style="font-size:9px;font-weight:700;color:var(--red);margin-bottom:3px">SIN SINCRONIZAR</div>'
      : '';
    var telStr  = p.tel ? ' &middot; ' + p.tel : '';
    var saldoStr = p.saldo > 0
      ? '<div style="font-size:12px;font-weight:700;color:var(--red);margin-top:2px">Saldo $' + fmt(p.saldo) + '</div>'
      : '';
    var montoStr = p.monto > 0
      ? '<div style="font-size:10px;color:var(--gray-400)">Total $' + fmt(p.monto) + '</div>'
      : '';
    var idStr = (p.id || '').replace(/'/g, '');
    html += '<div style="padding:10px 0;border-bottom:1px solid var(--gray-200);' + bgPend + '">'
      + sincTag
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
      + '<div>'
      + '<div style="font-size:12px;font-weight:700;color:var(--navy)">' + (p.folio || '&mdash;') + '</div>'
      + '<div style="font-size:13px;font-weight:600;color:var(--navy)">' + (p.cliente || '') + '</div>'
      + '<div style="font-size:10px;color:var(--gray-400)">' + (p.fecha || '') + telStr + '</div>'
      + '</div>'
      + '<div style="text-align:right">'
      + '<span style="font-size:10px;font-weight:700;color:' + color + ';background:rgba(0,0,0,0.04);padding:2px 7px;border-radius:8px">'
      + (ESTADO_LABELS[p.estado] || p.estado || '') + '</span>'
      + saldoStr + montoStr
      + '</div>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">'
      + '<button onclick="presAccionPago(\'' + idStr + '\')" style="padding:7px 4px;background:rgba(39,174,96,0.08);border:1.5px solid rgba(39,174,96,0.3);border-radius:8px;color:var(--green);font-size:11px;font-weight:700;cursor:pointer">Pago</button>'
      + '<button onclick="presEditar(\'' + idStr + '\')" style="padding:7px 4px;background:rgba(46,109,164,0.08);border:1.5px solid rgba(46,109,164,0.25);border-radius:8px;color:var(--blue);font-size:11px;font-weight:700;cursor:pointer">Editar</button>'
      + '<button onclick="presCrearOT(\'' + idStr + '\')" style="padding:7px 4px;background:rgba(200,146,58,0.08);border:1.5px solid rgba(200,146,58,0.3);border-radius:8px;color:var(--gold);font-size:11px;font-weight:700;cursor:pointer">OT</button>'
      + '</div>'
      + '</div>';
  }
  div.innerHTML = html;
}

// ── Folio auto-generado ───────────────────────────────────────────
function presActualizarFolio() {
  var numEl = document.getElementById('pres-num');
  var revEl = document.getElementById('pres-rev');
  var fEl   = document.getElementById('pres-fecha-folio');
  var ncEl  = document.getElementById('pres-numcli');
  if (!numEl) return;
  var num  = (numEl.value || '').padStart(3, '0');
  var rev  = revEl ? (revEl.value || 'A') : 'A';
  var nc   = ncEl ? (ncEl.value || '').toUpperCase() : '';
  var fechaStr = '';
  if (fEl && fEl.value) {
    var parts = fEl.value.split('-');
    if (parts.length === 3) fechaStr = parts[0].slice(-2) + parts[1] + parts[2];
  }
  var partes = [];
  if (num && num !== '000') partes.push(num + rev);
  if (fechaStr) partes.push(fechaStr);
  if (nc) partes.push(nc);
  var folio = partes.length ? 'CACN-' + partes.join('-') : 'CACN-';
  var prev = document.getElementById('pres-folio-preview');
  var hid  = document.getElementById('pres-folio');
  if (prev) prev.textContent = folio;
  if (hid)  hid.value = folio;
}

// ── Dropdown clientes ─────────────────────────────────────────────
var _cliCache = JSON.parse(localStorage.getItem('barrcan_clientes_cache') || '[]');

function presDropdownSeleccionar() {
  var sel = document.getElementById('pres-cli-select');
  if (!sel || !sel.value) return;
  var opt = sel.options[sel.selectedIndex];
  try {
    var c = JSON.parse(opt.dataset.c || '{}');
    var cl = document.getElementById('pres-cliente');
    var tl = document.getElementById('pres-tel');
    var dl = document.getElementById('pres-dir');
    if (cl) cl.value = c.nombre || '';
    if (tl) tl.value = c.telefono || '';
    if (dl) dl.value = c.dir_obra || c.direccion || '';
  } catch(e) {}
}

function presCargarClientesDropdown() {
  var sel = document.getElementById('pres-cli-select');
  if (!sel) return;
  sel.innerHTML = '<option value="">&mdash; Selecciona cliente &mdash;</option>';
  _cliCache.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = (c.num_cliente ? c.num_cliente + ' \u00b7 ' : '') + c.nombre;
    opt.dataset.c = JSON.stringify(c);
    sel.appendChild(opt);
  });
  if (!SYNC.online || !sb()) return;
  sb().from('clientes').select('id,nombre,telefono,empresa,dir_obra,direccion,num_cliente')
    .order('nombre').range(0, 999)
    .then(function(result) {
      if (result.error || !result.data) return;
      _cliCache = result.data;
      localStorage.setItem('barrcan_clientes_cache', JSON.stringify(_cliCache));
      sel.innerHTML = '<option value="">&mdash; Selecciona cliente &mdash;</option>';
      _cliCache.forEach(function(c) {
        var opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = (c.num_cliente ? c.num_cliente + ' \u00b7 ' : '') + c.nombre;
        opt.dataset.c = JSON.stringify(c);
        sel.appendChild(opt);
      });
    });
}

// ── Modal nuevo/editar ────────────────────────────────────────────
function presAbrirNuevo() {
  PRES_EDITANDO_ID = null;
  var titulo = document.getElementById('pres-modal-titulo');
  var btnDel = document.getElementById('pres-btn-eliminar');
  var errEl  = document.getElementById('pres-error');
  if (titulo) titulo.textContent = 'Nuevo Presupuesto';
  if (btnDel) btnDel.style.display = 'none';
  if (errEl)  errEl.style.display  = 'none';

  var hoy = new Date().toISOString().split('T')[0];
  var campos = ['pres-num','pres-cliente','pres-tel','pres-dir','pres-desc','pres-notas',
                'pres-monto','pres-saldo','pres-numcli'];
  campos.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  var revEl = document.getElementById('pres-rev');
  if (revEl) revEl.value = 'A';
  var fechaEl = document.getElementById('pres-fecha');
  if (fechaEl) fechaEl.value = hoy;
  var fechaFolioEl = document.getElementById('pres-fecha-folio');
  if (fechaFolioEl) fechaFolioEl.value = hoy;
  var estEl = document.getElementById('pres-estado');
  if (estEl) estEl.value = 'activo';
  var prevEl = document.getElementById('pres-folio-preview');
  if (prevEl) prevEl.textContent = 'CACN-';
  var hidEl = document.getElementById('pres-folio');
  if (hidEl) hidEl.value = '';
  var cliSel = document.getElementById('pres-cli-select');
  if (cliSel) cliSel.value = '';

  document.getElementById('pres-modal-overlay').style.display = 'block';
  document.getElementById('pres-modal').style.display        = 'block';
  // Cargar clientes en background, no bloquea el modal
  setTimeout(presCargarClientesDropdown, 50);
}

function presEditar(id) {
  var p = null;
  for (var i = 0; i < PRES_CACHE.length; i++) {
    if (PRES_CACHE[i].id === id) { p = PRES_CACHE[i]; break; }
  }
  if (!p) return;
  PRES_EDITANDO_ID = id;
  var titulo = document.getElementById('pres-modal-titulo');
  var btnDel = document.getElementById('pres-btn-eliminar');
  var errEl  = document.getElementById('pres-error');
  if (titulo) titulo.textContent = 'Editar Presupuesto';
  if (btnDel) btnDel.style.display = 'block';
  if (errEl)  errEl.style.display  = 'none';

  // Parsear folio en componentes
  var folioSinPref = (p.folio || '').replace(/^CACN-/i, '');
  var partesF = folioSinPref.split('-');
  var numrev  = partesF[0] || '';
  var numPart = numrev.replace(/[A-Za-z]$/, '');
  var revPart = /[A-Za-z]$/.test(numrev) ? numrev.slice(-1) : 'A';

  var numEl = document.getElementById('pres-num');
  var revEl = document.getElementById('pres-rev');
  var ncEl  = document.getElementById('pres-numcli');
  var ffEl  = document.getElementById('pres-fecha-folio');
  if (numEl) numEl.value = numPart;
  if (revEl) revEl.value = revPart;
  if (ncEl)  ncEl.value  = partesF[2] || '';
  if (ffEl) {
    var fechaF = partesF[1] || '';
    if (fechaF.length === 6) {
      ffEl.value = '20' + fechaF.slice(0,2) + '-' + fechaF.slice(2,4) + '-' + fechaF.slice(4,6);
    } else {
      ffEl.value = p.fecha || '';
    }
  }
  var prevEl = document.getElementById('pres-folio-preview');
  var hidEl  = document.getElementById('pres-folio');
  if (prevEl) prevEl.textContent = p.folio || 'CACN-';
  if (hidEl)  hidEl.value        = p.folio || '';

  var setVal = function(id, val) {
    var el = document.getElementById(id);
    if (el) el.value = val || '';
  };
  setVal('pres-cliente', p.cliente);
  setVal('pres-tel',     p.tel);
  setVal('pres-dir',     p.dir);
  setVal('pres-monto',   p.monto);
  setVal('pres-saldo',   p.saldo);
  setVal('pres-desc',    p.descripcion);
  setVal('pres-fecha',   p.fecha);
  setVal('pres-estado',  p.estado || 'activo');
  setVal('pres-notas',   '');

  document.getElementById('pres-modal-overlay').style.display = 'block';
  document.getElementById('pres-modal').style.display        = 'block';
  setTimeout(presCargarClientesDropdown, 50);
}

function presCerrarModal() {
  document.getElementById('pres-modal-overlay').style.display = 'none';
  document.getElementById('pres-modal').style.display        = 'none';
  PRES_EDITANDO_ID = null;
}

// ── Guardar (crear/editar) ────────────────────────────────────────
function presGuardarOffline(datos, esEdicion) {
  var cola = JSON.parse(localStorage.getItem('barrcan_presupuestos_pendientes') || '[]');
  cola.push({ tipo: esEdicion ? 'update' : 'nuevo', datos: datos, ts: new Date().toISOString() });
  localStorage.setItem('barrcan_presupuestos_pendientes', JSON.stringify(cola));
  if (esEdicion) {
    for (var i = 0; i < PRES_CACHE.length; i++) {
      if (PRES_CACHE[i].id === datos.id) {
        PRES_CACHE[i] = Object.assign({}, PRES_CACHE[i], datos, { _pendiente: true });
        break;
      }
    }
  } else {
    PRES_CACHE.unshift(Object.assign({}, datos, { _pendiente: true }));
  }
  presGuardarCache(PRES_CACHE);
  presCerrarModal();
  presFiltrar();
  toast('Guardado sin conexi\u00f3n \u00b7 se sincronizar\u00e1 al reconectar');
}

async function presGuardar() {
  // Construir folio desde campos si el hidden no fue actualizado
  presActualizarFolio();
  var folioEl    = document.getElementById('pres-folio');
  var clienteEl  = document.getElementById('pres-cliente');
  var errEl      = document.getElementById('pres-error');
  var folio      = folioEl ? folioEl.value.trim() : '';
  var cliente    = clienteEl ? clienteEl.value.trim() : '';
  if (errEl) errEl.style.display = 'none';
  if (!folio)   { if (errEl) { errEl.textContent = 'El folio es obligatorio'; errEl.style.display = 'block'; } return; }
  if (!cliente) { if (errEl) { errEl.textContent = 'El cliente es obligatorio'; errEl.style.display = 'block'; } return; }

  var btn = document.getElementById('pres-btn-guardar');
  if (btn && btn.disabled) return;
  if (btn) btn.disabled = true;

  var getVal = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var datos = {
    folio:       folio,
    cliente:     cliente,
    tel:         getVal('pres-tel')    || null,
    dir:         getVal('pres-dir')    || null,
    monto:       parseFloat(getVal('pres-monto')) || 0,
    saldo:       parseFloat(getVal('pres-saldo')) || 0,
    descripcion: getVal('pres-desc')   || null,
    estado:      getVal('pres-estado') || 'activo',
    fecha:       getVal('pres-fecha')  || null
  };

  var esEdicion = !!PRES_EDITANDO_ID;
  if (esEdicion) datos.id = PRES_EDITANDO_ID;

  if (!SYNC.online || !sb()) {
    if (!esEdicion) datos.id = crypto.randomUUID();
    presGuardarOffline(datos, esEdicion);
    if (btn) btn.disabled = false;
    return;
  }

  try {
    if (esEdicion) {
      var id = datos.id;
      var campos = Object.assign({}, datos);
      delete campos.id;
      var res = await sb().from('presupuestos_atrasados').update(campos).eq('id', id);
      if (res.error) throw res.error;
      for (var i = 0; i < PRES_CACHE.length; i++) {
        if (PRES_CACHE[i].id === id) {
          PRES_CACHE[i] = Object.assign({}, PRES_CACHE[i], campos);
          break;
        }
      }
      toast(folio + ' actualizado');
    } else {
      datos.id = crypto.randomUUID();
      datos.created_at = new Date().toISOString();
      var res2 = await sb().from('presupuestos_atrasados').insert([datos]);
      if (res2.error) throw res2.error;
      PRES_CACHE.unshift(datos);
      toast('Presupuesto ' + folio + ' guardado');
    }
    presGuardarCache(PRES_CACHE);
    presCerrarModal();
    presFiltrar();
  } catch(e) {
    var esRed = /failed to fetch|network|fetch/i.test(e.message || '');
    if (!esEdicion && !datos.id) datos.id = crypto.randomUUID();
    if (esRed) SYNC.online = false;
    presGuardarOffline(datos, esEdicion);
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── Eliminar ──────────────────────────────────────────────────────
async function presEliminar() {
  if (!PRES_EDITANDO_ID) return;
  var p = null;
  for (var i = 0; i < PRES_CACHE.length; i++) {
    if (PRES_CACHE[i].id === PRES_EDITANDO_ID) { p = PRES_CACHE[i]; break; }
  }
  if (!confirm('Eliminar ' + (p ? p.folio : 'este presupuesto') + '? No se puede deshacer.')) return;
  try {
    if (SYNC.online && sb()) {
      var r = await sb().from('presupuestos_atrasados').delete().eq('id', PRES_EDITANDO_ID);
      if (r.error) throw r.error;
    }
    PRES_CACHE = PRES_CACHE.filter(function(x) { return x.id !== PRES_EDITANDO_ID; });
    presGuardarCache(PRES_CACHE);
    toast('Presupuesto eliminado');
    presCerrarModal();
    presFiltrar();
  } catch(e) {
    var errEl = document.getElementById('pres-error');
    if (errEl) { errEl.textContent = 'Error: ' + e.message; errEl.style.display = 'block'; }
  }
}

// ── Reintentar pendientes ─────────────────────────────────────────
async function presReintentarPendientes() {
  var cola = JSON.parse(localStorage.getItem('barrcan_presupuestos_pendientes') || '[]');
  if (!cola.length || !sb()) return;
  toast('Reintentando ' + cola.length + ' presupuesto(s)...');
  var exitosos = [];
  for (var i = 0; i < cola.length; i++) {
    var item = cola[i];
    try {
      if (item.tipo === 'update') {
        var id = item.datos.id;
        var campos = Object.assign({}, item.datos);
        delete campos.id;
        var r = await sb().from('presupuestos_atrasados').update(campos).eq('id', id);
        if (r.error) throw r.error;
      } else {
        var r2 = await sb().from('presupuestos_atrasados').insert([item.datos]);
        if (r2.error) throw r2.error;
      }
      exitosos.push(item);
    } catch(e) { console.warn('Reintento falló:', e.message); }
  }
  var restantes = cola.filter(function(i2) { return exitosos.indexOf(i2) < 0; });
  localStorage.setItem('barrcan_presupuestos_pendientes', JSON.stringify(restantes));
  if (exitosos.length) {
    PRES_CACHE.forEach(function(p) { delete p._pendiente; });
    presGuardarCache(PRES_CACHE);
    toast(exitosos.length + ' sincronizado(s)');
    presFiltrar();
  }
  if (restantes.length) toast(restantes.length + ' aun pendiente(s)');
}

// ── Acciones rápidas ──────────────────────────────────────────────
function presAccionPago(id) {
  var p = null;
  for (var i = 0; i < PRES_CACHE.length; i++) {
    if (PRES_CACHE[i].id === id) { p = PRES_CACHE[i]; break; }
  }
  if (!p) return;
  var prefill = { folio: p.folio, cliente: p.cliente, tel: p.tel,
                  monto: p.monto, saldo: p.saldo, desc: p.descripcion };
  localStorage.setItem('barrcan_pago_prefill', JSON.stringify(prefill));
  window.location.href = 'pagos.html';
}

function presCrearOT(id) {
  var p = null;
  for (var i = 0; i < PRES_CACHE.length; i++) {
    if (PRES_CACHE[i].id === id) { p = PRES_CACHE[i]; break; }
  }
  if (!p) return;
  localStorage.setItem('barrcan_nueva_ot_prefill', JSON.stringify({
    folio: p.folio, cliente: p.cliente, tel: p.tel, dir: p.dir,
    desc: p.descripcion, saldo: p.saldo
  }));
  toast('Datos de OT preparados para: ' + p.folio);
  if (confirm('Folio: ' + p.folio + '\nCliente: ' + p.cliente + '\nSaldo: $' + fmt(p.saldo) + '\n\nAbrir módulo de Órdenes?')) {
    window.location.href = 'ordenes.html';
  }
}

// ── Init — DOMContentLoaded igual que barrcan_app.html ───────────
document.addEventListener('DOMContentLoaded', function() {
  detectarConexion();
  var local = presCargarCache();
  if (local.length) {
    PRES_CACHE = local;
    presFiltrar();
  }
  // Cargar de Supabase en background
  presCargar();
});

</script>
