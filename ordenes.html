.badge-en_camino  { background:rgba(41,128,185,0.12);  color:#2980B9; }

  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}

}

.catalog-card {

}
.catalog-card::before {

}

}

.card-svg {

  height: 80px;
  margin-bottom: 10px;
}
.card-name {

}

}

}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
.form-label {

}
.form-input, .form-select {

  font-weight: 500;

}
.form-input:focus, .form-select:focus {

.input-unit {

}

  letter-spacing: 0.5px;
  pointer-events: none;
}

.form-select-wrap { position: relative; }
.form-select-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);

  pointer-events: none;
  font-size: 14px;
}
select.form-select { padding-right: 36px; cursor: pointer; }

/* Switch */
.switch-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
}
.switch-info {}
.switch-label {

}

}
.toggle {

}

.toggle-knob {

  left: 3px;

  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

}
.piso-btn {

}
.piso-btn.active {

}

}
.modalidad-icon { font-size: 20px; margin-bottom: 4px; }
.modalidad-label { font-size: 11px; font-weight: 600; color: var(--navy); }

.btn-calcular {

.historial-empty-icon { font-size: 48px; margin-bottom: 12px; }
.historial-item {
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.historial-item:active { transform: scale(0.98); }
.hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.hist-diseno { font-size: 14px; font-weight: 700; color: var(--navy); }
.hist-precio { font-size: 16px; font-weight: 700; color: var(--gold); font-family: 'DM Mono', monospace; }
.hist-bottom { display: flex; gap: 8px; flex-wrap: wrap; }
.hist-tag {
  font-size: 10px;
  background: var(--gray-100);
  color: var(--gray-600);
  padding: 2px 7px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
}
.hist-date { font-size: 10px; color: var(--gray-400); margin-top: 4px; }

/* ─── CONFIG ─── */
.config-section { margin-bottom: 20px; }
.config-item {
  background: var(--white);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.config-item-label { font-size: 13px; font-weight: 600; color: var(--navy); }
.config-item-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--blue);
  font-weight: 600;
}
.config-input-inline {
  width: 80px;
  padding: 6px 10px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  text-align: right;
  background: var(--off-white);
}
.config-input-inline:focus { outline: none; border-color: var(--blue); }

.btn-limpiar {
  width: 100%;
  padding: 14px;
  background: rgba(192,57,43,0.08);
  border: 1.5px solid rgba(192,57,43,0.25);
  border-radius: var(--radius);
  color: var(--red);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-limpiar:active { background: rgba(192,57,43,0.15); }

/* ─── NO RESULTS ─── */
.no-selection {
  text-align: center;
  padding: 40px 20px;
  color: var(--gray-400);
}
.no-sel-icon { font-size: 40px; margin-bottom: 12px; }
.no-sel-text { font-size: 14px; }

/* ─── FOOTER EXPORT BTN ─── */
.export-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--gray-200);
  padding: 12px 16px;
  display: none;
  gap: 10px;
  z-index: 200;
}
.export-bar.visible { display: flex; }
.btn-export {
  flex: 1;
  padding: 14px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}
.btn-export:active { transform: scale(0.97); }
.btn-save {
  width: 52px;
  height: 52px;
  background: var(--gold);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-save:active { transform: scale(0.95); }

/* ─── SELECCIÓN MÚLTIPLE ─── */
.historial-item { transition: all 0.15s; }
.hist-selected {
  border: 2px solid var(--blue) !important;
  background: rgba(46,109,164,0.04) !important;
}
.hist-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--gray-200);
  background: var(--off-white);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  transition: all 0.15s;
  margin-top: 2px;
}
.hist-check.checked {
  background: var(--blue);
  border-color: var(--blue);
}

/* Barra flotante de selección */
.barra-seleccion {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--navy);
  padding: 12px 16px;
  display: none;
  align-items: center;
  gap: 12px;
  z-index: 300;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
  border-top: 2px solid var(--gold);
}
.barra-seleccion.visible { display: flex; }
.sel-info { flex: 1; }
.sel-count { font-size: 11px; color: rgba(255,255,255,0.6); }
.sel-total { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 700; color: var(--gold-light); }
.btn-generar-global {
  padding: 12px 18px;
  background: linear-gradient(135deg, var(--orange), #FF8533);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 4px 12px rgba(255,102,0,0.4);
  transition: all 0.2s;
}
.btn-generar-global:active { transform: scale(0.96); }

/* ─── PRINT / PDF ─── */
@media print {
  /* Ocultar toda la app */
  #app, .header, .tabs, .export-bar, .toast,
  .barra-seleccion, #modal-overlay, #modal-edicion,
  #modal-contrato-overlay, #modal-contrato,
  #entrega-overlay { display: none !important; }
  /* Mostrar solo el área de impresión activa */
  #print-area, #ent-print-area {
    display: block !important;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: white;
  }
  body { margin: 0; padding: 0; background: white; }
  @page { margin: 12mm 14mm; size: letter; }
}

/* ─── MÓDULO ENTREGA ─── */
.ent-check-item {
  display:flex;align-items:flex-start;gap:10px;
  background:var(--off-white);border-radius:var(--radius-sm);
  padding:10px 12px;border:1.5px solid var(--gray-100);transition:border-color 0.15s;
}
.ent-check-item.ok { border-color:rgba(45,125,70,0.3);background:rgba(45,125,70,0.04); }
.ent-check-item.fail { border-color:rgba(192,57,43,0.3);background:rgba(192,57,43,0.04); }
.ent-check-toggle { display:flex;gap:5px;flex-shrink:0;margin-top:2px; }
.ent-check-btn {
  width:28px;height:28px;border-radius:50%;border:1.5px solid var(--gray-200);
  background:white;font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.ent-check-btn.sel-ok { background:var(--green);border-color:var(--green); }
.ent-check-btn.sel-fail { background:var(--red);border-color:var(--red); }
.ent-check-desc { flex:1;font-size:12px;color:var(--navy);line-height:1.4; }
.ent-check-nota { width:100%;margin-top:6px;padding:6px 8px;border:1px solid var(--gray-200);border-radius:4px;font-size:11px;font-family:'DM Sans',sans-serif; }
.ent-evidencia-item {
  border:2px dashed var(--gray-200);border-radius:var(--radius-sm);
  padding:12px;cursor:pointer;transition:all 0.2s;
  background:var(--off-white);position:relative;
}
.ent-evidencia-item.completo { border-color:rgba(45,125,70,0.4);background:rgba(45,125,70,0.04); }
.ent-ev-row { display:flex;align-items:center;gap:10px; }
.ent-ev-ico { font-size:22px;flex-shrink:0; }
.ent-ev-titulo { font-size:12px;font-weight:700;color:var(--navy); }
.ent-ev-sub { font-size:10px;color:var(--gray-400);margin-top:1px; }
.ent-ev-preview { width:100%;max-height:140px;object-fit:cover;border-radius:6px;margin-top:8px;display:none; }
.ent-ev-done { position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--green);border-radius:50%;display:none;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700; }
.ent-evidencia-item.completo .ent-ev-done { display:flex; }

}
.encuesta-overlay.visible { display:block; }
.enc-card { background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px; }
.enc-pregunta { font-size:14px;font-weight:600;color:white;margin-bottom:10px;line-height:1.4; }
.enc-opciones { display:flex;flex-direction:column;gap:7px; }
.enc-opcion {
  padding:10px 14px;border-radius:var(--radius-sm);

  transition:all 0.15s;font-family:'DM Sans',sans-serif;width:100%;

.enc-opcion:active { transform:scale(0.98); }
.enc-textarea {
  width:100%;padding:10px;border-radius:var(--radius-sm);

}
.enc-textarea::placeholder { color:rgba(255,255,255,0.3); }

/* Animations */
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.slide-up { animation: slideUp 0.35s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.shake { animation: shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--navy);
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Vidrio SVG preview */
.vidrio-preview {
  background: var(--gray-100);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  text-align: center;
}

<script>
var SB_URL='https://rmngjtzupukhylxlgcww.supabase.co';
var SB_KEY='sb_publishable_udZ-NNvSLrSaDk2dBRPwMg_IQCZ4N2I';
var _sbClient=null;
function sb(){
  if(!_sbClient&&window.supabase){
    _sbClient=window.supabase.createClient(SB_URL,SB_KEY,{
      db:{schema:'barrcan'},auth:{persistSession:true,storageKey:'barrcan_auth'}
    });
  }
  return _sbClient;
}
var SYNC={online:navigator.onLine};
window.addEventListener('online', function(){SYNC.online=true;detectarConexion();otCargar();var c=JSON.parse(localStorage.getItem('barrcan_ordenes_pendientes')||'[]');if(c.length)otReintentarPendientes();});
window.addEventListener('offline',function(){SYNC.online=false;detectarConexion();});
function detectarConexion(){var b=document.getElementById('conn-status');if(b)b.textContent=navigator.onLine?'Online':'Offline-First';}
function fmt(n){return Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:2});}
function toast(msg,dur){dur=dur||2800;var el=document.getElementById('_toast');if(!el){el=document.createElement('div');el.id='_toast';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1B3A5C;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3)';document.body.appendChild(el);}el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0';},dur);}

var OT_CACHE=[];
var OT_EDITANDO=null;
var OT_FILTRO_ESTADO='';
var _HOJA_OT_HTML='';

var ESTADO_CFG={
  pendiente: {label:'Pendiente', color:'var(--gold)',  bg:'rgba(200,146,58,0.1)'},
  en_camino: {label:'En camino', color:'var(--blue)',  bg:'rgba(46,109,164,0.1)'},
  instalado: {label:'Instalado', color:'var(--green)', bg:'rgba(39,174,96,0.1)'},
  cancelado: {label:'Cancelado', color:'var(--red)',   bg:'rgba(192,57,43,0.1)'}
};

function otGuardarCache(l){try{localStorage.setItem('barrcan_ordenes_cache',JSON.stringify(l));}catch(e){}}
function otCargarCache(){try{var r=localStorage.getItem('barrcan_ordenes_cache');return r?JSON.parse(r):[]; }catch(e){return [];}}

async function otCargar(){
  var div=document.getElementById('ot-lista');
  var local=otCargarCache();
  if(local.length){OT_CACHE=local;otRender();}
  else div.innerHTML='<div style="text-align:center;padding:30px;color:var(--gray-400);font-size:13px">Sin ordenes registradas</div>';
  if(!sb())return;
  try{
    var res=await sb().from('ordenes_trabajo')
      .select('id,folio_cotizacion,cliente_nombre,cliente_tel,dir_obra,descripcion_trabajo,tecnico_id,fecha_instalacion,hora_instalacion,saldo_pendiente,notas_tecnico,num_piezas,estado,created_at')
      .order('fecha_instalacion',{ascending:false}).range(0,200);
    if(res.error)throw res.error;
    SYNC.online=true;detectarConexion();
    OT_CACHE=res.data||[];otGuardarCache(OT_CACHE);otRender();
  }catch(e){
    var esRed=/failed to fetch|network|fetch/i.test(e.message||'');

function otGuardarOffline(payload,esEdicion){
  var cola=JSON.parse(localStorage.getItem('barrcan_ordenes_pendientes')||'[]');
  cola.push({tipo:esEdicion?'update':'nuevo',datos:payload,ts:new Date().toISOString()});
  localStorage.setItem('barrcan_ordenes_pendientes',JSON.stringify(cola));
  if(esEdicion){for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===payload.id){OT_CACHE[i]=Object.assign({},OT_CACHE[i],payload,{_pendiente:true});break;}}}
  else{OT_CACHE.unshift(Object.assign({},payload,{_pendiente:true}));}
  otGuardarCache(OT_CACHE);otCerrar();otRender();
  toast('Guardado sin conexion - se sincronizara al reconectar');
}

async function otGuardar(){
  var cliente=document.getElementById('ot-cliente').value.trim();
  var dir=document.getElementById('ot-dir').value.trim();
  var tecnico=document.getElementById('ot-tecnico').value;
  var fecha=document.getElementById('ot-fecha').value;
  var errEl=document.getElementById('ot-error');
  errEl.style.display='none';
  if(!cliente){errEl.textContent='El cliente es obligatorio';errEl.style.display='block';return;}
  if(!dir){errEl.textContent='La direccion es obligatoria';errEl.style.display='block';return;}
  if(!tecnico){errEl.textContent='Debes asignar un tecnico';errEl.style.display='block';return;}
  if(!fecha){errEl.textContent='La fecha es obligatoria';errEl.style.display='block';return;}
  var btn=document.getElementById('ot-btn-guardar');
  if(btn&&btn.disabled)return;
  if(btn)btn.disabled=true;
  var gv=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var payload={
    folio_cotizacion:    gv('ot-folio')||null,
    cliente_nombre:      cliente,
    cliente_tel:         gv('ot-tel')||null,
    dir_obra:            dir,
    descripcion_trabajo: gv('ot-desc')||null,
    tecnico_id:          tecnico,
    fecha_instalacion:   fecha,
    hora_instalacion:    gv('ot-hora')||null,
    saldo_pendiente:     parseFloat(gv('ot-saldo'))||0,
    notas_tecnico:       gv('ot-notas')||null,
    num_piezas:          parseInt(document.getElementById('ot-piezas').value)||1,
    estado:              gv('ot-estado')||'pendiente'
  };
  var esEdicion=!!OT_EDITANDO;
  if(esEdicion)payload.id=OT_EDITANDO;
  if(!SYNC.online||!sb()){
    if(!esEdicion)payload.id=crypto.randomUUID();
    otGuardarOffline(payload,esEdicion);if(btn)btn.disabled=false;return;
  }
  try{
    if(esEdicion){
      var id=payload.id;var campos=Object.assign({},payload);delete campos.id;
      var r=await sb().from('ordenes_trabajo').update(campos).eq('id',id);
      if(r.error)throw r.error;
      for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===id){OT_CACHE[i]=Object.assign({},OT_CACHE[i],campos);break;}}
      toast('Orden actualizada');
    }else{
      payload.id=crypto.randomUUID();payload.created_at=new Date().toISOString();
      var r2=await sb().from('ordenes_trabajo').insert([payload]);
      if(r2.error)throw r2.error;
      OT_CACHE.unshift(payload);toast('Orden creada - Tecnico: '+tecnico);
    }
    otGuardarCache(OT_CACHE);otCerrar();otRender();
  }catch(e){
    var esRed=/failed to fetch|network|fetch/i.test(e.message||'');
    if(!esEdicion&&!payload.id)payload.id=crypto.randomUUID();
    if(esRed)SYNC.online=false;
    otGuardarOffline(payload,esEdicion);
  }finally{if(btn)btn.disabled=false;}
}

function otCambiarEstado(id){
  var o=null;for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===id){o=OT_CACHE[i];break;}}
  if(!o)return;
  var idx=parseInt(prompt('Cambiar estado de "'+o.cliente_nombre+'":\n\n1: Pendiente\n2: En camino\n3: Instalado\n4: Cancelado\n\nIngresa el numero:'));
  if(isNaN(idx)||idx<1||idx>4)return;
  var estados=['pendiente','en_camino','instalado','cancelado'];
  var nuevo=estados[idx-1];
  for(var j=0;j<OT_CACHE.length;j++){if(OT_CACHE[j].id===id){OT_CACHE[j].estado=nuevo;break;}}
  otGuardarCache(OT_CACHE);otRender();
  if(SYNC.online&&sb()){sb().from('ordenes_trabajo').update({estado:nuevo}).eq('id',id).then(function(r){if(!r.error)toast('Estado: '+nuevo);else toast('Actualizado localmente');});}
  else toast('Estado actualizado sin conexion');
}

async function otEliminar(){
  if(!OT_EDITANDO)return;
  var o=null;for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===OT_EDITANDO){o=OT_CACHE[i];break;}}
  if(!confirm('Eliminar orden de '+(o?o.cliente_nombre:'?')+'?'))return;
  try{
    if(SYNC.online&&sb()){var r=await sb().from('ordenes_trabajo').delete().eq('id',OT_EDITANDO);if(r.error)throw r.error;}
    OT_CACHE=OT_CACHE.filter(function(x){return x.id!==OT_EDITANDO;});
    otGuardarCache(OT_CACHE);toast('Orden eliminada');otCerrar();otRender();
  }catch(e){var errEl=document.getElementById('ot-error');if(errEl){errEl.textContent='Error: '+e.message;errEl.style.display='block';}}
}

    var item=cola[i];
    try{
      if(item.tipo==='update'){var id=item.datos.id;var c=Object.assign({},item.datos);delete c.id;var r=await sb().from('ordenes_trabajo').update(c).eq('id',id);if(r.error)throw r.error;}
      else{var r2=await sb().from('ordenes_trabajo').insert([item.datos]);if(r2.error)throw r2.error;}
      ok.push(item);
    }catch(e){console.warn('OT reintento:',e.message);}
  }
  var rest=cola.filter(function(i2){return ok.indexOf(i2)<0;});
  localStorage.setItem('barrcan_ordenes_pendientes',JSON.stringify(rest));
  if(ok.length){OT_CACHE.forEach(function(o){delete o._pendiente;});otGuardarCache(OT_CACHE);otRender();toast(ok.length+' orden(es) sincronizada(s)');}
}

document.addEventListener('DOMContentLoaded',function(){
  detectarConexion();
  var local=otCargarCache();
  if(local.length){OT_CACHE=local;otRender();}
  otCargar();
});
</script>
</body>
</html>
