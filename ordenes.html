<title>BarrCan &middot; Ordenes</title>
<!--
  BARRCAN - MODULO: ORDENES DE TRABAJO
  VERSION : v1.5
  FECHA   : 2026-07-13
  v1.5 - Rubro por orden (incluye Taller):
    - Nuevo campo "Rubro" al crear/editar una orden: Ventanas/Puertas,
      Baños, Domo, Barandal, Taller, Otro. Se muestra como etiqueta en
      cada tarjeta de la lista.
    - "Taller" sirve para registrar trabajo interno (ej. Ramón, que no
      sale a instalar) como una orden más, aparte de las instalaciones
      en campo -- útil junto con el sueldo fijo en tecnicos.html.
    - Requiere el SQL adjunto (agregar_rubro_puesto.sql).
  VERSION : v1.4
  FECHA   : 2026-07-13
  v1.4 - Equipo multi-técnico + costo de mano de obra:
    - Nuevo: "Técnicos de apoyo" (selección múltiple) cuando una
      instalación la hacen 2 o más personas — además del "Técnico
      encargado" de siempre. Se guarda en la tabla orden_tecnicos.
    - Nuevo campo "Costo de mano de obra" (opcional) por orden — es lo
      que se reparte entre el equipo para el pago semanal (ver
      tecnicos.html v1.1). No es el precio de venta al cliente.
    - Al marcar una orden como "Instalado" ahora se guarda
      fecha_completado — necesario para que el pago semanal sepa qué
      semana le corresponde a cada orden.
    - Requiere el SQL adjunto (modulo_tecnicos_equipos_pagos.sql).
    - Limitación conocida: si se arma el equipo estando SIN CONEXIÓN, esa
      parte no se reintenta automáticamente al reconectar (sí se
      reintenta la orden en sí) — hay que volver a abrir y guardar la
      orden ya con señal para que el equipo quede sincronizado.
  VERSION : v1.3
  FECHA   : 2026-07-13
  v1.3 - Conectado con el módulo Técnicos (tecnicos.html):
    - El selector "Técnico asignado" ahora se llena dinámicamente desde
      la tabla tecnicos (solo los activos), en vez de la lista fija de 5
      nombres embebida en el HTML. Si agregas/quitas un técnico en
      tecnicos.html, aparece aquí automáticamente sin tocar código.
    - Respaldo: si no hay conexión, o el SQL de tecnicos.html todavía no
      se ha corrido en Supabase, se queda con la lista fija de siempre
      (Esaú/Miguel/Carlos/Omar/Rodrigo) — el formulario nunca se rompe
      por esto.
  VERSION : v1.2
  FECHA   : 2026-07-12
  v1.2 - Logo estandarizado y cargado desde GitHub Pages:
    - El header ahora carga el ícono desde
      https://barrcan.github.io/barrcan-app/assets/logo-icono.jpg, con
      respaldo automático a un base64 embebido si falla la carga.
    - La 'Hoja de instalación' generada ya NO copia el src del header;
      usa siempre el base64 de respaldo para que el logo nunca salga
      roto, con o sin señal.
  v1.0 - Creacion inicial
    - Columnas exactas de tabla ordenes_trabajo
    - Conectado a presupuestos via prefill localStorage
    - Offline-first: mismo patron que historial.html v2.0
    - Lista con filtro por estado, cambio rapido de estado
    - Hoja de trabajo imprimible + WA de confirmacion al cliente
    - Sin optional chaining, sin template literals peligrosos
-->

:root {

}
.offline-badge {

/* ─── TABS ─── */
.tabs {
  background: var(--navy);
  display: flex;
  border-bottom: 2px solid rgba(200,146,58,0.3);
  flex-shrink: 0;
  overflow-x: auto;
  overflow-y: hidden;

  scrollbar-width: none;
  scroll-behavior: smooth;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  min-width: 68px;
  padding: 10px 10px;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  cursor: pointer;
  border-bottom: 2px solid transparent;

  flex-direction: column;
  align-items: center;

  white-space: nowrap;
}
.tab-icon { font-size: 16px; }

/* ─── CONTENT ─── */
.content {

  overflow-y: auto;

}

/* ─── SCREEN ─── */

/* ─── CATÁLOGO AGRUPADO ─── */

  box-shadow: var(--shadow-sm);
}

}

.familia-header-left {
  display: flex;
  align-items: center;
  gap: 10px;

  min-width: 0;
}
.familia-emoji { font-size: 20px; flex-shrink: 0; }
.familia-nombre {

}

}
.familia-badge {

  color: var(--gold-light);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
.familia-chevron {

.familia-body {

}

.catalogo-seccion-header {
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  padding: 18px 4px 6px;
  margin-top: 4px;
  border-bottom: 1px solid var(--gray-200);
  margin-bottom: 8px;
}
.catalogo-seccion-header:first-child { padding-top: 4px; margin-top: 0; }
.familia-vacia .familia-header { opacity: 0.55; cursor: default; }
.familia-vacia .familia-badge { background: rgba(90,86,82,0.15); color: var(--gray-400); }
.familia-vacia-label {
  padding: 14px 16px;
  font-size: 12px;
  color: var(--gray-400);
  background: var(--white);
  text-align: center;
  font-style: italic;
}
.orden-filtro-btn {
  padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray-200);
  background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;
  color:var(--gray-400);cursor:pointer;white-space:nowrap;transition:all 0.15s;
}
.orden-filtro-btn.active {
  background:var(--navy);color:#fff;border-color:var(--navy);
}
.orden-card {

  margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer;
  border-left:5px solid var(--gray-200);transition:all 0.15s;
}
.orden-card.pendiente  { border-left-color:#F39C12; }
.orden-card.en_camino  { border-left-color:#2980B9; }
.orden-card.completada { border-left-color:#27AE60; }
.orden-card.cancelada  { border-left-color:#E74C3C; opacity:0.6; }
.orden-estado-badge {
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;
  letter-spacing:0.5px;text-transform:uppercase;
}
.badge-pendiente  { background:rgba(243,156,18,0.12);  color:#E67E22; }
.badge-en_camino  { background:rgba(41,128,185,0.12);  color:#2980B9; }
.badge-completada { background:rgba(39,174,96,0.12);   color:#27AE60; }
.badge-cancelada  { background:rgba(231,76,60,0.12);   color:#E74C3C; }
  background: rgba(46,109,164,0.12);
  color: var(--blue);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 8px;
  margin-left: 6px;
}

/* ─── CATALOG GRID ─── */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.section-sub {
  font-size: 12px;
  color: var(--gray-400);
  margin-bottom: 16px;
  letter-spacing: 0.3px;
}

.catalog-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.catalog-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.catalog-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--blue);
  opacity: 0;
  transition: opacity 0.2s;
}
.catalog-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,146,58,0.15);
}
.catalog-card.selected::before { opacity: 1; background: var(--gold); }
.catalog-card:active { transform: scale(0.97); }

.card-svg {
  width: 100%;
  height: 80px;
  margin-bottom: 10px;
}
.card-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.3;
  margin-bottom: 3px;
}
.card-series {
  font-size: 10px;
  color: var(--blue);
  font-weight: 500;
  background: rgba(46,109,164,0.08);
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 4px;
}
.card-badge {
  font-size: 9px;
  color: var(--gray-400);
  font-family: 'DM Mono', monospace;
}

/* ─── FORM ─── */
.wizard-card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.wizard-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wizard-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gray-200);
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 5px;
  letter-spacing: 0.3px;
}
.form-input, .form-select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--navy);
  background: var(--off-white);
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(46,109,164,0.12);
  background: var(--white);
}
.form-input.mm-input { font-family: 'DM Mono', monospace; font-size: 18px; letter-spacing: 1px; }
.input-unit {
  position: relative;
}
.input-unit .form-input { padding-right: 48px; }
.input-unit-label {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-400);
  letter-spacing: 0.5px;
  pointer-events: none;
}

.form-select-wrap { position: relative; }
.form-select-wrap::after {
  content: '▾';
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--blue);
  pointer-events: none;
  font-size: 14px;
}
select.form-select { padding-right: 36px; cursor: pointer; }

/* Switch */
.switch-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
}
.switch-info {}
.switch-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--navy);
}
.switch-desc {
  font-size: 11px;
  color: var(--gray-400);
  margin-top: 2px;
}
.toggle {
  width: 46px;
  height: 26px;
  background: var(--gray-200);
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--blue); }
.toggle-knob {
  width: 20px;
  height: 20px;
  background: white;
  border-radius: 50%;
  position: absolute;
  top: 3px;
  left: 3px;
  transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle.on .toggle-knob { transform: translateX(20px); }

/* Piso selector */
.piso-selector {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.piso-btn {
  flex: 1;
  min-width: 36px;
  padding: 8px 4px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: var(--off-white);
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-600);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.piso-btn.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--white);
}
.piso-btn:active { transform: scale(0.92); }

/* Modalidad */
.modalidad-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modalidad-btn {
  padding: 12px 10px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  background: var(--off-white);
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.modalidad-btn.active {
  border-color: var(--gold);
  background: rgba(200,146,58,0.06);
}
.modalidad-icon { font-size: 20px; margin-bottom: 4px; }
.modalidad-label { font-size: 11px; font-weight: 600; color: var(--navy); }
.modalidad-desc { font-size: 10px; color: var(--gray-400); }

/* ─── CALCULAR BTN ─── */
.btn-calcular {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--orange), #FF8533);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(255,102,0,0.35);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-calcular:active { transform: scale(0.97); box-shadow: 0 3px 10px rgba(255,102,0,0.25); }
.btn-calcular:disabled { background: var(--gray-200); box-shadow: none; color: var(--gray-400); }

/* ─── ALERTA DE PESO ─── */
.peso-alert {
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.peso-alert.verde { background: rgba(45,125,70,0.08); border: 1.5px solid rgba(45,125,70,0.25); }
.peso-alert.ambar { background: rgba(230,126,34,0.08); border: 1.5px solid rgba(230,126,34,0.30); }
.peso-alert.rojo { background: rgba(192,57,43,0.08); border: 1.5px solid rgba(192,57,43,0.35); }
.alert-icon { font-size: 24px; flex-shrink: 0; margin-top: 1px; }
.alert-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.peso-alert.verde .alert-title { color: var(--green); }
.peso-alert.ambar .alert-title { color: var(--amber); }
.peso-alert.rojo .alert-title { color: var(--red); }
.alert-body { font-size: 11px; color: var(--gray-600); line-height: 1.5; }

/* ─── RESULTADO / PRESUPUESTO ─── */
.resultado-header {
  background: linear-gradient(135deg, var(--navy), #2A4F7A);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
  color: white;
  position: relative;
  overflow: hidden;
}
.resultado-header::after {
  content: 'BC';
  position: absolute;
  right: -8px;
  bottom: -20px;
  font-family: 'Playfair Display', serif;
  font-size: 80px;
  font-weight: 900;
  color: rgba(255,255,255,0.04);
  pointer-events: none;
}
.res-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
.res-diseno { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
.res-medidas {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--gold-light);
  letter-spacing: 1px;
}
.res-precio-final {
  text-align: right;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.15);
}
.res-precio-label { font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.res-precio-monto {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--gold-light);
}
.res-precio-mxn { font-size: 14px; font-weight: 400; margin-left: 4px; opacity: 0.7; }

/* Vista toggle */
.vista-toggle {
  display: flex;
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 12px;
}
.vista-btn {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: transparent;

// ── Lista de técnicos dinámica (desde tabla tecnicos, módulo tecnicos.html) ──
// Si falla (sin conexión, o el SQL de tecnicos.html aún no se corrió),
// se queda con las 5 opciones fijas que ya traía el <select> en el HTML
// — nunca se rompe el formulario de crear orden por esto.
var OT_TECNICOS_LISTA = [
  {tecnico_id_login:'ESAU', nombre_completo:'Esau'},
  {tecnico_id_login:'MIGUEL', nombre_completo:'Miguel'},
  {tecnico_id_login:'CARLOS', nombre_completo:'Carlos'},
  {tecnico_id_login:'OMAR', nombre_completo:'Omar'},
  {tecnico_id_login:'RODRIGO', nombre_completo:'Rodrigo'}
];

async function otCargarTecnicosDinamico() {
  var sel = document.getElementById('ot-tecnico');
  if (!sel || !sb()) return;
  try {
    var res = await sb().from('tecnicos').select('nombre_completo,tecnico_id_login')
      .eq('activo', true).eq('eliminado', false).order('nombre_completo');
    if (res.error) throw res.error;
    var datos = (res.data || []).filter(function(t) { return t.tecnico_id_login; });
    if (!datos.length) return; // tabla vacía o SQL no corrido aún — se queda con la lista fija
    var valorPrevio = sel.value;
    sel.innerHTML = '<option value="">-- Selecciona tecnico --</option>'
      + datos.map(function(t) {
          return '<option value="' + t.tecnico_id_login + '">' + t.nombre_completo + '</option>';
        }).join('');
    if (valorPrevio) sel.value = valorPrevio;
    OT_TECNICOS_LISTA = datos;
    localStorage.setItem('barrcan_tecnicos_select_cache', JSON.stringify(datos));
    otRenderApoyoCheckboxes();
  } catch(e) {
    console.warn('[BarrCan] No se pudo cargar la lista de técnicos desde Supabase (se usa la lista fija):', e);
  }
}

// Dibuja los checkboxes de "técnicos de apoyo" a partir de la lista
// cargada (dinámica o la fija de respaldo). preSeleccionados: array de
// tecnico_id ya asignados como apoyo (al editar una orden existente).
function otRenderApoyoCheckboxes(preSeleccionados) {
  var cont = document.getElementById('ot-apoyo-lista');
  if (!cont) return;
  var encargado = (document.getElementById('ot-tecnico') || {}).value || '';
  preSeleccionados = preSeleccionados || otApoyoSeleccionActual();
  cont.innerHTML = OT_TECNICOS_LISTA.filter(function(t) { return t.tecnico_id_login !== encargado; }).map(function(t) {
    var checked = preSeleccionados.indexOf(t.tecnico_id_login) >= 0 ? 'checked' : '';
    return '<label style="display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--off-white);border:1.5px solid var(--gray-200);border-radius:20px;font-size:12px;cursor:pointer">'
      + '<input type="checkbox" value="' + t.tecnico_id_login + '" class="ot-apoyo-chk" ' + checked + ' style="margin:0">'
      + t.nombre_completo + '</label>';
  }).join('');
}

// Lee qué checkboxes de apoyo están marcados ahora mismo en el DOM.
function otApoyoSeleccionActual() {
  var out = [];
  document.querySelectorAll('.ot-apoyo-chk').forEach(function(chk) { if (chk.checked) out.push(chk.value); });
  return out;
}
function fmt(n){return Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:0,maximumFractionDigits:2});}
function toast(msg,dur){dur=dur||2800;var el=document.getElementById('_toast');if(!el){el=document.createElement('div');el.id='_toast';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1B3A5C;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3)';document.body.appendChild(el);}el.textContent=msg;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0';},dur);}

  pendiente: {label:'Pendiente', color:'var(--gold)',  bg:'rgba(200,146,58,0.1)'},

function otGuardarCache(l){try{localStorage.setItem('barrcan_ordenes_cache',JSON.stringify(l));}catch(e){}}
function otCargarCache(){try{var r=localStorage.getItem('barrcan_ordenes_cache');return r?JSON.parse(r):[]; }catch(e){return [];}}

async function otCargar(){
  var div=document.getElementById('ot-lista');
  var local=otCargarCache();
  if(local.length){OT_CACHE=local;otRender();}
  else div.innerHTML='<div style="text-align:center;padding:30px;color:var(--gray-400);font-size:13px">Sin ordenes registradas</div>';
  if(!sb())return;
  try{
    var res=await sb().from('ordenes_trabajo')
      .select('id,folio_cotizacion,cliente_nombre,cliente_tel,dir_obra,descripcion_trabajo,tecnico_id,fecha_instalacion,hora_instalacion,saldo_pendiente,notas_tecnico,num_piezas,estado,created_at')
      .order('fecha_instalacion',{ascending:false}).range(0,200);
    if(res.error)throw res.error;
    SYNC.online=true;detectarConexion();
    OT_CACHE=res.data||[];otGuardarCache(OT_CACHE);otRender();
  }catch(e){
    var esRed=/failed to fetch|network|fetch/i.test(e.message||'');
    if(esRed){SYNC.online=false;detectarConexion();}
    console.warn('otCargar:',e.message);
    if(!local.length)div.innerHTML='<div style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px">'+(esRed?'Sin conexion':'Error al cargar')+'<br><button onclick="otCargar()" style="margin-top:8px;padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">Reintentar</button></div>';
  }
}

function otSetFiltro(btn,estado){
  OT_FILTRO_ESTADO=estado;
  document.querySelectorAll('.ot-filtro').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');otRender();
}

function otRender(){
  var q=(document.getElementById('ot-buscar')||{}).value||'';
  q=q.toLowerCase().trim();
  var datos=OT_FILTRO_ESTADO?OT_CACHE.filter(function(o){return o.estado===OT_FILTRO_ESTADO;}):OT_CACHE;
  var ocultos=0;
  // En "Todas" y sin búsqueda activa, las órdenes ya instaladas se ocultan
  // para no saturar la vista — igual se pueden consultar buscando por
  // folio/cliente, o entrando directo a la pestaña "Instalado".
  if(!OT_FILTRO_ESTADO && !q){
    var antes=datos.length;
    datos=datos.filter(function(o){return o.estado!=='instalado';});
    ocultos=antes-datos.length;
  }
  if(q){
    datos=datos.filter(function(o){
      return (o.cliente_nombre||'').toLowerCase().indexOf(q)>=0
        || (o.folio_cotizacion||'').toLowerCase().indexOf(q)>=0;
    });
  }
  var pend=JSON.parse(localStorage.getItem('barrcan_ordenes_pendientes')||'[]');
  var cntEl=document.getElementById('ot-contador');
  if(cntEl){
    var txt=datos.length+' orden'+(datos.length!==1?'es':'');
    if(ocultos) txt+=' &middot; '+ocultos+' instalada'+(ocultos>1?'s':'')+' oculta'+(ocultos>1?'s':'');
    if(pend.length) txt+=' ('+pend.length+' sin sync)';
    cntEl.innerHTML=txt;
  }
  var div=document.getElementById('ot-lista');
  if(!datos.length){div.innerHTML='<div style="text-align:center;padding:30px;color:var(--gray-400);font-size:13px">Sin ordenes'+(OT_FILTRO_ESTADO?' en este estado':'')+'</div>';return;}
  var html='';
  for(var i=0;i<Math.min(datos.length,80);i++){
    var o=datos[i];
    var cfg=ESTADO_CFG[o.estado]||{label:o.estado,color:'var(--gray-400)',bg:'rgba(0,0,0,0.04)'};
    var bgPend=o._pendiente?'background:rgba(192,57,43,0.04);border-left:3px solid var(--red);padding-left:8px':'';
    var pendTag=o._pendiente?'<div style="font-size:9px;font-weight:700;color:var(--red);margin-bottom:3px">SIN SINCRONIZAR</div>':'';
    var idStr=(o.id||'').replace(/'/g,'');
    var RUBRO_LABELS={ventanas:'Ventanas',banos:'Baños',domo:'Domo',barandal:'Barandal',taller:'Taller',otro:'Otro'};

    try{var raw=localStorage.getItem('barrcan_nueva_ot_prefill');
      if(raw){var pf=JSON.parse(raw);localStorage.removeItem('barrcan_nueva_ot_prefill');

function otGuardarOffline(payload,esEdicion){
  var cola=JSON.parse(localStorage.getItem('barrcan_ordenes_pendientes')||'[]');
  cola.push({tipo:esEdicion?'update':'nuevo',datos:payload,ts:new Date().toISOString()});
  localStorage.setItem('barrcan_ordenes_pendientes',JSON.stringify(cola));
  if(esEdicion){for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===payload.id){OT_CACHE[i]=Object.assign({},OT_CACHE[i],payload,{_pendiente:true});break;}}}
  else{OT_CACHE.unshift(Object.assign({},payload,{_pendiente:true}));}
  otGuardarCache(OT_CACHE);otCerrar();otRender();
  toast('Guardado sin conexion - se sincronizara al reconectar');
}

async function otGuardar(){
  var cliente=document.getElementById('ot-cliente').value.trim();
  var dir=document.getElementById('ot-dir').value.trim();
  var tecnico=document.getElementById('ot-tecnico').value;
  var fecha=document.getElementById('ot-fecha').value;
  var errEl=document.getElementById('ot-error');
  errEl.style.display='none';
  if(!cliente){errEl.textContent='El cliente es obligatorio';errEl.style.display='block';return;}
  if(!dir){errEl.textContent='La direccion es obligatoria';errEl.style.display='block';return;}
  if(!tecnico){errEl.textContent='Debes asignar un tecnico';errEl.style.display='block';return;}
  if(!fecha){errEl.textContent='La fecha es obligatoria';errEl.style.display='block';return;}
  var btn=document.getElementById('ot-btn-guardar');
  if(btn&&btn.disabled)return;
  if(btn)btn.disabled=true;
  var gv=function(id){var el=document.getElementById(id);return el?el.value.trim():'';};
  var payload={
    folio_cotizacion:    gv('ot-folio')||null,
    cliente_nombre:      cliente,
    cliente_tel:         gv('ot-tel')||null,
    dir_obra:            dir,
    descripcion_trabajo: gv('ot-desc')||null,
    tecnico_id:          tecnico,
    fecha_instalacion:   fecha,
    hora_instalacion:    gv('ot-hora')||null,
    saldo_pendiente:     parseFloat(gv('ot-saldo'))||0,
    notas_tecnico:       gv('ot-notas')||null,
    num_piezas:          parseInt(document.getElementById('ot-piezas').value)||1,
    estado:              gv('ot-estado')||'pendiente',
    costo_mano_obra:     parseFloat(gv('ot-costo-mo'))||null,
    rubro:               gv('ot-rubro')||'ventanas'
  };
  var apoyoSeleccionado = otApoyoSeleccionActual();
  var esEdicion=!!OT_EDITANDO;
  if(esEdicion)payload.id=OT_EDITANDO;
  if(!SYNC.online||!sb()){
    if(!esEdicion)payload.id=crypto.randomUUID();
    otGuardarOffline(payload,esEdicion);if(btn)btn.disabled=false;return;
  }
  try{
    if(esEdicion){
      var id=payload.id;var campos=Object.assign({},payload);delete campos.id;
      var r=await sb().from('ordenes_trabajo').update(campos).eq('id',id);
      if(r.error)throw r.error;
      for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===id){OT_CACHE[i]=Object.assign({},OT_CACHE[i],campos);break;}}
      toast('Orden actualizada');
    }else{
      payload.id=crypto.randomUUID();payload.created_at=new Date().toISOString();
      var r2=await sb().from('ordenes_trabajo').insert([payload]);
      if(r2.error)throw r2.error;
      OT_CACHE.unshift(payload);toast('Orden creada - Tecnico: '+tecnico);
    }
    // Sincronizar equipo: se borra lo que hubiera y se vuelve a insertar
    // (encargado + apoyo), más simple y seguro que tratar de calcular el
    // diff exacto de quién se agregó o quitó.
    try {
      await sb().from('orden_tecnicos').delete().eq('orden_id', payload.id);
      var filasEquipo = [{orden_id: payload.id, tecnico_id: tecnico, rol: 'encargado'}]
        .concat(apoyoSeleccionado.map(function(tid) { return {orden_id: payload.id, tecnico_id: tid, rol: 'apoyo'}; }));
      await sb().from('orden_tecnicos').insert(filasEquipo);
    } catch(eEquipo) {
      console.warn('[BarrCan] No se pudo sincronizar el equipo de la orden (no crítico):', eEquipo);
    }
    otGuardarCache(OT_CACHE);otCerrar();otRender();
  }catch(e){
    var esRed=/failed to fetch|network|fetch/i.test(e.message||'');
    if(!esEdicion&&!payload.id)payload.id=crypto.randomUUID();
    if(esRed)SYNC.online=false;
    otGuardarOffline(payload,esEdicion);
  }finally{if(btn)btn.disabled=false;}
}

function otCambiarEstado(id){
  var o=null;for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===id){o=OT_CACHE[i];break;}}
  if(!o)return;
  var idx=parseInt(prompt('Cambiar estado de "'+o.cliente_nombre+'":\n\n1: Pendiente\n2: En camino\n3: Instalado\n4: Cancelado\n\nIngresa el numero:'));
  if(isNaN(idx)||idx<1||idx>4)return;
  var estados=['pendiente','en_camino','instalado','cancelado'];
  var nuevo=estados[idx-1];
  var campos={estado:nuevo};
  if(nuevo==='instalado')campos.fecha_completado=new Date().toISOString();
  for(var j=0;j<OT_CACHE.length;j++){if(OT_CACHE[j].id===id){OT_CACHE[j].estado=nuevo;if(campos.fecha_completado)OT_CACHE[j].fecha_completado=campos.fecha_completado;break;}}
  otGuardarCache(OT_CACHE);otRender();
  if(SYNC.online&&sb()){sb().from('ordenes_trabajo').update(campos).eq('id',id).then(function(r){if(!r.error)toast('Estado: '+nuevo);else toast('Actualizado localmente');});}
  else toast('Estado actualizado sin conexion');
}

async function otEliminar(){
  if(!OT_EDITANDO)return;
  var o=null;for(var i=0;i<OT_CACHE.length;i++){if(OT_CACHE[i].id===OT_EDITANDO){o=OT_CACHE[i];break;}}
  if(!confirm('Eliminar orden de '+(o?o.cliente_nombre:'?')+'?'))return;
  try{
    if(SYNC.online&&sb()){var r=await sb().from('ordenes_trabajo').delete().eq('id',OT_EDITANDO);if(r.error)throw r.error;}
    OT_CACHE=OT_CACHE.filter(function(x){return x.id!==OT_EDITANDO;});
    otGuardarCache(OT_CACHE);toast('Orden eliminada');otCerrar();otRender();
  }catch(e){var errEl=document.getElementById('ot-error');if(errEl){errEl.textContent='Error: '+e.message;errEl.style.display='block';}}
}

  for(var i=0;i<cola.length;i++){
    var item=cola[i];
    try{
      if(item.tipo==='update'){var id=item.datos.id;var c=Object.assign({},item.datos);delete c.id;var r=await sb().from('ordenes_trabajo').update(c).eq('id',id);if(r.error)throw r.error;}
      else{var r2=await sb().from('ordenes_trabajo').insert([item.datos]);if(r2.error)throw r2.error;}
      ok.push(item);
    }catch(e){console.warn('OT reintento:',e.message);}
  }
  var rest=cola.filter(function(i2){return ok.indexOf(i2)<0;});
  localStorage.setItem('barrcan_ordenes_pendientes',JSON.stringify(rest));
  if(ok.length){OT_CACHE.forEach(function(o){delete o._pendiente;});otGuardarCache(OT_CACHE);otRender();toast(ok.length+' orden(es) sincronizada(s)');}
}

document.addEventListener('DOMContentLoaded',function(){
  detectarConexion();
  var local=otCargarCache();
  if(local.length){OT_CACHE=local;otRender();}
  otCargar();
  otCargarTecnicosDinamico();
});
</script>
</body>
</html>
